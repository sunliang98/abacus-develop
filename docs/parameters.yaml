  - name: init_vecpot_file
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      Initialize vector potential through file or not.
      * True: Initialize vector potential from file At.dat (unit: a.u.). It consists of four columns, representing the step number and vector potential on each direction.
      * False: Calculate vector potential by integrating the electric field.
    default_value: "False"
    unit: ""
    availability: ""
  - name: ocp
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      * True: Fixes the band occupations based on the values specified in ocp_set.
      * False: Does not fix the band occupations.
    default_value: "False"
    unit: ""
    availability: ""
  - name: ocp_set
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: String
    description: |
      If ocp is set to 1, ocp_set must be provided as a string specifying the occupation numbers for each band across all k-points. The format follows a space-separated pattern, where occupations are assigned sequentially to bands for each k-point. A shorthand notation Nx can be used to repeat a value x for N bands.
      * Example:
        1 10*1 0 1 represents occupations for 13 bands, where the 12th band is fully unoccupied (0), and all others are occupied (1).
      * For a system with multiple k-points, the occupations must be specified for all k-points, following their order in the output file kpoints (may lead to fractional occupations).
      * Incorrect specification of ocp_set could lead to inconsistencies in electron counting, causing the calculation to terminate with an error.
    default_value: None
    unit: ""
    availability: ""
  - name: of_cd
    category: "TDOFDFT: time dependent orbital free density functional theory"
    type: Boolean
    description: |
      Added the current dependent(CD) potential. (https://doi.org/10.1103/PhysRevB.98.144302)
      * True: Added the CD potential.
      * False: Not added the CD potential.
    default_value: "False"
    unit: ""
    availability: TDOFDFT
  - name: of_mcd_alpha
    category: "TDOFDFT: time dependent orbital free density functional theory"
    type: Real
    description: |
      The value of the parameter alpha in modified CD potential method. mCDPotential=alpha*CDPotential (proposed in paper PhysRevB.98.144302)
    default_value: "1.0"
    unit: ""
    availability: TDOFDFT
  - name: xc_kernel
    category: Linear Response TDDFT (Under Development Feature)
    type: String
    description: |
      The exchange-correlation kernel used in the calculation. Currently supported: RPA, LDA, PBE, HSE, HF.
    default_value: LDA
    unit: ""
    availability: ""
  - name: lr_init_xc_kernel
    category: Linear Response TDDFT (Under Development Feature)
    type: "Vector of String (>=1 values)"
    description: |
      The method to initalize the xc kernel.
      * "default": Calculate xc kernel from the ground-state charge density.
      * "file": Read the xc kernel on grid from the provided files. The following words should be the paths of ".cube" files, where the first 1 (nspin==1) or 3 (nspin==2, namely spin-aa, spin-ab and spin-bb) will be read in. The parameter xc_kernel will be invalid. Now only LDA-type kernel is supported as the potential will be calculated by directly multiplying the transition density.
      * "from_charge_file": Calculate fxc from the charge density read from the provided files. The following words should be the paths of ".cube" files, where the first nspin files will be read in.
    default_value: "\"default\""
    unit: ""
    availability: ""
  - name: lr_solver
    category: Linear Response TDDFT (Under Development Feature)
    type: String
    description: |
      The method to solve the Casida equation in LR-TDDFT under Tamm-Dancoff approximation (TDA).
      * dav/dav_subspace/cg: Construct and diagonalize the Hamiltonian matrix iteratively with Davidson/Non-ortho-Davidson/CG algorithm.
      * lapack: Construct the full matrix and directly diagonalize with LAPACK.
      * spectrum: Calculate absorption spectrum only without solving Casida equation.
    default_value: dav
    unit: ""
    availability: ""
  - name: lr_thr
    category: Linear Response TDDFT (Under Development Feature)
    type: Real
    description: |
      The convergence threshold of iterative diagonalization solver for LR-TDDFT. It is a pure-math number with the same meaning as pw_diag_thr, but since the Casida equation is a one-shot eigenvalue problem, it is also the convergence threshold of LR-TDDFT.
    default_value: "1e-2"
    unit: ""
    availability: ""
  - name: nocc
    category: Linear Response TDDFT (Under Development Feature)
    type: Integer
    description: |
      The number of occupied orbitals (up to HOMO) used in the LR-TDDFT calculation.
      * Note: If the value is illegal ( > nelec/2 or <= 0), it will be autoset to nelec/2.
    default_value: nband
    unit: ""
    availability: ""
  - name: nvirt
    category: Linear Response TDDFT (Under Development Feature)
    type: Integer
    description: |
      The number of virtual orbitals (starting from LUMO) used in the LR-TDDFT calculation.
    default_value: "1"
    unit: ""
    availability: ""
  - name: lr_nstates
    category: Linear Response TDDFT (Under Development Feature)
    type: Integer
    description: |
      The number of 2-particle states to be solved.
    default_value: "0"
    unit: ""
    availability: ""
  - name: lr_unrestricted
    category: Linear Response TDDFT (Under Development Feature)
    type: Boolean
    description: |
      Whether to use unrestricted construction for LR-TDDFT (the matrix size will be doubled).
      * True: Always use unrestricted LR-TDDFT.
      * False: Use unrestricted LR-TDDFT only when the system is open-shell.
    default_value: "False"
    unit: ""
    availability: ""
  - name: abs_wavelen_range
    category: Linear Response TDDFT (Under Development Feature)
    type: Real Real
    description: |
      The range of the wavelength for the absorption spectrum calculation.
    default_value: 0.0 0.0
    unit: nm
    availability: ""
  - name: out_wfc_lr
    category: Linear Response TDDFT (Under Development Feature)
    type: Boolean
    description: |
      Whether to output the eigenstates (excitation energy) and eigenvectors (excitation amplitude) of the LR-TDDFT calculation. The output files are OUT.{suffix}/Excitation_Amplitude_${processor_rank}.dat.
    default_value: "False"
    unit: ""
    availability: ""
  - name: abs_gauge
    category: Linear Response TDDFT (Under Development Feature)
    type: String
    description: |
      Whether to use length or velocity gauge to calculate the absorption spectrum in LR-TDDFT.
    default_value: length
    unit: ""
    availability: ""
  - name: abs_broadening
    category: Linear Response TDDFT (Under Development Feature)
    type: Real
    description: |
      The broadening factor for the absorption spectrum calculation.
    default_value: "0.01"
    unit: ""
    availability: ""
  - name: out_freq_ion
    category: Output information
    type: Integer
    description: |
      Controls the output interval in ionic steps. When set to a positive integer, information such as charge density, local potential, electrostatic potential, Hamiltonian matrix, overlap matrix, density matrix, and Mulliken population analysis is printed every n ionic steps.

      [NOTE] In RT-TDDFT calculations, this parameter is inactive; output frequency is instead controlled by out_freq_td.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_freq_td
    category: Output information
    type: Integer
    description: |
      Controls the output interval in completed electronic evolution steps during RT-TDDFT calculations. When set to a positive integer n, detailed information (see out_freq_ion) is printed every n electron time-evolution steps (i.e., every STEP OF ELECTRON EVOLVE). For example, if you wish to output information once per ionic step, you should set out_freq_td equal to estep_per_md, since one ionic step corresponds to estep_per_md electronic evolution steps.

      [NOTE] This parameter is only active in RT-TDDFT mode (esolver_type = tddft). It has no effect in ground-state calculations.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_freq_elec
    category: Output information
    type: Integer
    description: |
      Output the charge density (only binary format, controlled by out_chg), wavefunction (controlled by out_wfc_pw) per out_freq_elec electronic iterations. Note that they are always output when converged or reach the maximum iterations scf_nmax.
    default_value: scf_nmax
    unit: ""
    availability: ""
  - name: out_chg
    category: Output information
    type: "Integer \\[Integer\\](optional)"
    description: |
      The first integer controls whether to output the charge density on real space grids:
      * 1: Output the charge density (in Bohr^-3) on real space grids into the density files in the folder OUT.{suffix} too, which can be read in NSCF calculation.

      In molecular dynamics simulations, the output frequency is controlled by out_freq_ion.

      [NOTE] In the 3.10-LTS version, the file names are SPIN1_CHG.cube and SPIN1_CHG_INI.cube, etc.
    default_value: 0 3
    unit: ""
    availability: ""
  - name: out_pot
    category: Output information
    type: "Integer \\[Integer\\](optional)"
    description: |
      * 1: Output the total local potential (i.e., local pseudopotential + Hartree potential + XC potential + external electric field (if exists) + dipole correction potential (if exists) + ...) on real space grids (in Ry) into files in the folder OUT.{suffix}. The files are named as:
       * nspin = 1: pots1.cube;
       * nspin = 2: pots1.cube and pots2.cube;
       * nspin = 4: pots1.cube, pots2.cube, pots3.cube, and pots4.cube
      * 2: Output the electrostatic potential on real space grids into OUT.{suffix}/pot_es.cube. The Python script named tools/average_pot/aveElecStatPot.py can be used to calculate the average electrostatic potential along the z-axis and outputs it into ElecStaticPot_AVE. Please note that the total local potential refers to the local component of the self-consistent potential, excluding the non-local pseudopotential. The distinction between the local potential and the electrostatic potential is as follows: local potential = electrostatic potential + XC potential.
      * 3: Apart from 1, also output the total local potential of the initial charge density. The files are named as:
       * nspin = 1: pots1_ini.cube;
       * nspin = 2: pots1_ini.cube and pots2_ini.cube;
       * nspin = 4: pots1_ini.cube, pots2_ini.cube, pots3_ini.cube, and pots4_ini.cube

      The optional second integer controls the output precision. If not provided, the default precision is 8.

      In molecular dynamics calculations, the output frequency is controlled by out_freq_ion.

      [NOTE] In the 3.10-LTS version, the file names are SPIN1_POT.cube and SPIN1_POT_INI.cube, etc.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_dmk
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to output the density matrix for each k-point into files in the folder OUT.${suffix}. The files are named as:
      * For gamma only case:
       * nspin = 1 and 4: dm_nao.csr;
       * nspin = 2: dms1_nao.csr and dms2_nao.csr for the two spin channels.
      * For multi-k points case:
       * nspin = 1 and 4: dmk1_nao.csr, dmk2_nao.csr, ...;
       * nspin = 2: dmk1s1_nao.csr... and dmk1s2_nao.csr... for the two spin channels.

      [NOTE] In the 3.10-LTS version, the parameter is named out_dm and the file names are SPIN1_DM and SPIN2_DM, etc.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: out_dmr
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to output the density matrix with Bravias lattice vector R index into files in the folder OUT.${suffix}. The files are named as dmr{s}{spin index}{g}{geometry index}{_nao} + {".csr"}. Here, 's' refers to spin, where s1 means spin up channel while s2 means spin down channel, and the sparse matrix format 'csr' is mentioned in out_mat_hs2. Finally, if out_app_flag is set to false, the file name contains the optional 'g' index for each ionic step that may have different geometries, and if out_app_flag is set to true, the density matrix with respect to Bravias lattice vector R accumulates during ionic steps:
      * nspin = 1: dmrs1_nao.csr;
      * nspin = 2: dmrs1_nao.csr and dmrs2_nao.csr for the two spin channels.

      [NOTE] In the 3.10-LTS version, the parameter is named out_dm1, and the file names are data-DMR-sparse_SPIN0.csr and data-DMR-sparse_SPIN1.csr, etc.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis (multi-k points)
  - name: out_wfc_pw
    category: Output information
    type: Integer
    description: |
      Whether to output the electronic wavefunction coefficients into files and store them in the folder OUT.${suffix}. The files are named as wf{k}{k-point index}{s}{spin index}{g}{geometry index}{e}{electronic iteration index}{_pw} + {".txt"/".dat"}. Here, the s index refers to spin but the label will not show up for non-spin-polarized calculations, where s1 means spin up channel while s2 means spin down channel, and s4 refers to spinor wave functions that contains both spin channels with spin-orbital coupling or noncollinear calculations enabled. For scf or nscf calculations, g index will not appear, but the g index appears for geometry relaxation and molecular dynamics, where one can use the out_freq_ion command to control. To print out the electroinc wave functions every few SCF iterations, use the out_freq_elec command and the e index will appear in the file name.
      * 0: no output
      * 1: (txt format)
       * non-gamma-only with nspin=1: wfk1_pw.txt, wfk2_pw.txt, ...;
       * non-gamma-only with nspin=2: wfk1s1_pw.txt, wfk1s2_pw.txt, wfk2s1_pw.txt, wfk2s2_pw.txt, ...;
       * non-gamma-only with nspin=4: wfk1s4_pw.txt, wfk2s4_pw.txt, ...;
      * 2: (binary format)
       * non-gamma-only with nspin=1: wfk1_pw.dat, wfk2_pw.dat, ...;
       * non-gamma-only with nspin=2: wfk1s1_pw.dat, wfk1s2_pw.dat, wfk2s1_pw.dat, wfk2s2_pw.dat, ...;
       * non-gamma-only with nspin=4: wfk1s4_pw.dat, wfk2s4_pw.dat, ...;

      [NOTE] In the 3.10-LTS version, the file names are WAVEFUNC1.dat, WAVEFUNC2.dat, etc.
    default_value: "0"
    unit: ""
    availability: "Output electronic wave functions in plane wave basis, or transform the real-space electronic wave function into plane wave basis (see get_wf option in calculation with NAO basis)"
  - name: out_wfc_lcao
    category: Output information
    type: Integer
    description: |
      Whether to output the electronic wavefunction coefficients into files and store them in the folder OUT.${suffix}. The files are named as wf{s}{spin index}{k(optional)}{k-point index}{g(optional)}{geometry index1}{_nao} + {".txt"/".dat"}. Here, 's' refers to spin, where s1 means spin up channel while s2 means spin down channel, and 's12' refer to spinor wave functions that contains both spin channels with spin-orbital coupling or noncollinear calculations enabled. In addition, if 'gamma_only' is set to 0, then the optinoal k-point sampling index appears with the k-point index attached to the electronic wave function file names. Finally, if out_app_flag is set to false, the file name contains the optional 'g' index for each ionic step that may have different geometries, and if out_app_flag is set to true, the wave functions accumulate during ionic steps. If the out_app_flag is set to false, a new folder named WFC will be created, and the wave function files will be saved into it.
      * 0: no output
      * 1: (txt format)
       * gamma-only: wfs1_nao.txt or wfs2_nao.txt, ...;
       * non-gamma-only: wfs1k1_nao.txt or wfs1k2_nao.txt, ...;
      * 2: (binary format)
       * gamma-only: wfs1_nao.dat or wfs2_nao.dat, ...;
       * non-gamma-only: wfs1k1_nao.dat or wfs1k2_nao.dat, ....

      The corresponding sequence of the orbitals can be seen in Basis Set.

      Also controled by out_freq_ion and out_app_flag.

      [NOTE] In the 3.10-LTS version, the file names are WFC_NAO_GAMMA1_ION1.txt and WFC_NAO_K1_ION1.txt, etc.
    default_value: "0"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: out_dos
    category: Output information
    type: Integer
    description: |
      Whether to output the density of states (DOS). For more information, refer to the dos.md.
      * 0: no output
      * 1: output the density of states (DOS)
       * nspin=1 or 4: doss1g{geom}_{basis}.txt, where geom is the geometry index when cell changes or ions move while basis is either pw or nao.
       * nspin=2: doss1g{geom}_{basis}.txt and doss2g{geom}_{basis}.txt for two spin channles.
      * 2: (LCAO) output the density of states (DOS) and the projected density of states (PDOS)
      * 3: output the Fermi surface file (fermi.bxsf) in BXSF format that can be visualized by XCrySDen
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_ldos
    category: Output information
    type: "Integer \\[Integer\\](optional)"
    description: |
      Whether to output the local density of states (LDOS), optionally output precision can be set by a second parameter, default is 3.
      * 0: no output
      * 1: output the partial charge density for given bias (controlled by stm_bias) in cube file format, which can be used to plot scanning tunneling spectroscopys to mimick STM images using the Python script plot.py.
      * 2: output LDOS along a line in real space (controlled by ldos_line). Parameters used to control DOS output are also valid for LDOS.
      * 3: output both two LDOS modes above.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_band
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to output the eigenvalues of the Hamiltonian matrix (in eV) into the running log during electronic iterations and into a file at the end of calculations. The former can be used with the 'out_freq_elec' parameter while the latter option allows the output precision to be set via a second parameter, with a default value of 8. The output file names are:
       * nspin = 1 or 4: eig.txt;
       * nspin = 2: eigs1.txt and eigs2.txt;
       * For more information, refer to the band.md
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_proj_band
    category: Output information
    type: Boolean
    description: |
      Whether to output the projected band structure. For more information, refer to the band.md
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_stru
    category: Output information
    type: Boolean
    description: |
      Whether to output structure files per ionic step in geometry relaxation calculations into OUT.{istep}_D, where ${istep} is the ionic step.
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_level
    category: Output information
    type: String
    description: |
      Control the output level of information in OUT.{calculation}.log.
      * ie: electronic iteration level, which prints useful information for electronic iterations;
      * i: geometry relaxation level, which prints some information for geometry relaxations additionally;
      * m: molecular dynamics level, which does not print some information for simplicity.
    default_value: ie
    unit: ""
    availability: ""
  - name: out_mat_hs
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to print the upper triangular part of the Hamiltonian matrices and overlap matrices for each k-point into files in the directory OUT.${suffix}. The second number controls precision. For more information, please refer to hs_matrix.md. Also controled by out_freq_ion and out_app_flag.
      * For gamma only case:
       * nspin = 1: hks1_nao.txt for the Hamiltonian matrix and sks1_nao.txt for the overlap matrix;
       * nspin = 2: hks1_nao.txt and hks2_nao.txt for the Hamiltonian matrix and sks1_nao.txt for the overlap matrix. Note that the code will not output sks2_nao.txt because it is the same as sks1_nao.txt;
       * nspin = 4: hks12_nao.txt for the Hamiltonian matrix and sks12_nao.txt for the overlap matrix.
      * For multi-k points case:
       * nspin = 1: hks1k1_nao.txt for the Hamiltonian matrix at the 1st k-point, and sks1k1_nao.txt for the overlap matrix for the 1st k-point, ...;
       * nspin = 2: hks1k1_nao.txt and hks2k1_nao.txt for the two spin channels of the Hamiltonian matrix at the 1st k-point, and sks1k1_nao.txt for the overlap matrix for the 1st k-point. Note that the code will not output sks2k1_nao.txt because it is the same as sks1k1_nao.txt, ...;
       * nspin = 4: hks12k1_nao.txt for the Hamiltonian matrix at the 1st k-point, and sks12k1_nao.txt for the overlap matrix for the 1st k-point, ...;

      [NOTE] In the 3.10-LTS version, the file names are data-0-H and data-0-S, etc.
    default_value: False 8
    unit: Ry
    availability: Numerical atomic orbital basis
  - name: out_mat_hs2
    category: Output information
    type: Boolean
    description: |
      Whether to print files containing the Hamiltonian matrix and overlap matrix into files in the directory OUT.${suffix}. For more information, please refer to hs_matrix.md.

      [NOTE] In the 3.10-LTS version, the file names are data-HR-sparse_SPIN0.csr and data-SR-sparse_SPIN0.csr, etc.
    default_value: "False"
    unit: Ry
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_mat_tk
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to print the upper triangular part of the kinetic matrices for each k-point into OUT.${suffix}/tks1ki_nao.txt, where i is the index of k points. One may optionally provide a second parameter to specify the precision.

      [NOTE] In the 3.10-LTS version, the file names are data-TR-sparse_SPIN0.csr, etc.
    default_value: "False [8]"
    unit: Ry
    availability: Numerical atomic orbital basis
  - name: out_mat_r
    category: Output information
    type: Boolean
    description: |
      Whether to print the matrix representation of the position matrix into a file named rr.csr in the directory OUT.${suffix}. If calculation is set to get_s, the position matrix can be obtained without scf iterations. For more information, please refer to position_matrix.md.

      [NOTE] In the 3.10-LTS version, the file name is data-rR-sparse.csr.
    default_value: "False"
    unit: Bohr
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_mat_t
    category: Output information
    type: Boolean
    description: |
      Generate files containing the kinetic energy matrix. The format will be the same as the Hamiltonian matrix and overlap matrix as mentioned in out_mat_hs2. The name of the files will be trs1_nao.csr and so on. Also controled by out_freq_ion and out_app_flag.

      [NOTE] In the 3.10-LTS version, the file name is data-TR-sparse_SPIN0.csr.
    default_value: "False"
    unit: Ry
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_mat_dh
    category: Output information
    type: Boolean
    description: |
      Whether to print files containing the derivatives of the Hamiltonian matrix. The format will be the same as the Hamiltonian matrix and overlap matrix as mentioned in out_mat_hs2. The name of the files will be dhrxs1_nao.csr, dhrys1_nao.csr, dhrzs1_nao.csr and so on. Also controled by out_freq_ion and out_app_flag.

      [NOTE] In the 3.10-LTS version, the file name is data-dHRx-sparse_SPIN0.csr and so on.
    default_value: "False"
    unit: Ry/Bohr
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_mat_ds
    category: Output information
    type: Boolean
    description: |
      Whether to print files containing the derivatives of the overlap matrix. The format will be the same as the overlap matrix as mentioned in out_mat_dh. The name of the files will be dsrxs1.csr and so on. Also controled by out_freq_ion and out_app_flag. This feature can be used with calculation get_s.

      [NOTE] In the 3.10-LTS version, the file name is data-dSRx-sparse_SPIN0.csr and so on.
    default_value: "False"
    unit: Ry/Bohr
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_mat_xc
    category: Output information
    type: Boolean
    description: |
      Whether to print the upper triangular part of the exchange-correlation matrices in Kohn-Sham orbital representation: for each k point into files in the directory OUT.i_nao.txt, where {suffix}/vxc_out.dat. If EXX is calculated, the local and EXX part of band energy will also be printed in OUT.{suffix}/vxc_exx_out.dat, respectively. All the vxc_out.dat files contains 3 integers (nk, nspin, nband) followed by nk*nspin*nband lines of energy Hartree and eV.

      [NOTE] In the 3.10-LTS version, the file name is k-$k-Vxc and so on.
    default_value: "False"
    unit: Ry
    availability: Numerical atomic orbital (NAO) and NAO-in-PW basis
  - name: out_mat_xc2
    category: Output information
    type: Boolean
    description: |
      Whether to print the exchange-correlation matrices in numerical orbital representation: in CSR format in the directory OUT.s.

      [NOTE] In the 3.10-LTS version, the file name is Vxc_R_spin$s and so on.
    default_value: "False"
    unit: Ry
    availability: Numerical atomic orbital (NAO) basis
  - name: out_mat_l
    category: Output information
    type: "Boolean \\[Integer\\](optional)"
    description: |
      Whether to print the expectation value of the angular momentum operator , , and in the basis of the localized atomic orbitals. The files are named OUT.{suffix}_Lx.dat, OUT.{suffix}_Ly.dat, and OUT.{suffix}_Lz.dat. The second integer controls the precision of the output.
    default_value: False 8
    unit: ""
    availability: Numerical atomic orbital (NAO) basis
  - name: out_xc_r
    category: Output information
    type: "Integer \\[Integer\\](optional)"
    description: |
      The first integer controls whether to output the exchange-correlation (in Bohr^-3) on real space grids using Libxc to folder OUT.${suffix}:
      * 0: rho, amag, sigma, exc
      * 1: vrho, vsigma
      * 2: v2rho2, v2rhosigma, v2sigma2
      * 3: v3rho3, v3rho2sigma, v3rhosigma2, v3sigma3
      * 4: v4rho4, v4rho3sigma, v4rho2sigma2, v4rhosigma3, v4sigma4 The meaning of the files is presented in Libxc

      The second integer controls the precision of the charge density output, if not given, will use 3 as default.

      The circle order of the charge density on real space grids is: x is the outer loop, then y and finally z (z is moving fastest).
    default_value: "-1 3"
    unit: ""
    availability: ""
  - name: out_eband_terms
    category: Output information
    type: Boolean
    description: |
      Whether to print the band energy terms separately in the file OUT.{term}_out.dat. The terms include the kinetic, pseudopotential (local + nonlocal), Hartree and exchange-correlation (including exact exchange if calculated).
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: out_mul
    category: Output information
    type: Boolean
    description: |
      Whether to print the Mulliken population analysis result into OUT.${suffix}/mulliken.txt. In molecular dynamics calculations, the output frequency is controlled by out_freq_ion.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: out_app_flag
    category: Output information
    type: Boolean
    description: |
      Whether to output r(R), H(R), S(R), T(R), dH(R), dS(R), and wfc matrices in an append manner during molecular dynamics calculations. Check input parameters out_mat_r, out_mat_hs2, out_mat_t, out_mat_dh, out_mat_hs and out_wfc_lcao for more information.
    default_value: "true"
    unit: ""
    availability: Numerical atomic orbital basis (not gamma-only algorithm)
  - name: out_ndigits
    category: Output information
    type: Integer
    description: |
      Controls the length of decimal part of output data, such as charge density, Hamiltonian matrix, Overlap matrix and so on.
    default_value: "8"
    unit: ""
    availability: out_mat_hs 1 case presently.
  - name: out_element_info
    category: Output information
    type: Boolean
    description: |
      Whether to print element information into files in the directory OUT.{element_label}, including pseudopotential and orbital information of the element (in atomic Ryberg units).
    default_value: "False"
    unit: ""
    availability: ""
  - name: restart_save
    category: Output information
    type: Boolean
    description: |
      Whether to save charge density files per ionic step, which are used to restart calculations. According to the value of read_file_dir:
      * auto: These files are saved in folder OUT.{read_file_dir}/restart/.

      If EXX(exact exchange) is calculated (i.e. dft_fuctional==hse/hf/pbe0/scan0 or rpa==True), the Hexx(R) files for each processor will also be saved in the above folder, which can be read in EXX calculation with restart_load==True.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: rpa
    category: Output information
    type: Boolean
    description: |
      Generate output files used in rpa calculations.

      [NOTE] If symmetry is set to 1, additional files containing the necessary information for exploiting symmetry in the subsequent rpa calculation will be output: irreducible_sector.txt, symrot_k.txt and symrot_R.txt.
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_pchg
    category: Output information
    type: String
    description: |
      Specifies the electronic states to calculate the charge densities with state index for, using a space-separated string of 0s and 1s. Each digit in the string corresponds to a state, starting from the first state. A 1 indicates that the charge density should be calculated for that state, while a 0 means the state will be ignored. The parameter allows a compact and flexible notation (similar to ocp_set), for example the syntax 1 4*0 5*1 0 is used to denote the selection of states: 1 means calculate for the first state, 4*0 skips the next four states, 5*1 means calculate for the following five states, and the final 0 skips the next state. It's essential that the total count of states does not exceed the total number of states (nbands); otherwise, it results in an error, and the process exits. The input string must contain only numbers and the asterisk (*) for repetition, ensuring correct format and intention of state selection. The outputs comprise multiple .cube files following the naming convention pchgi[state]s[spin]k[kpoint].cube.
    default_value: none
    unit: ""
    availability: "For both PW and LCAO. When basis_type = lcao, used when calculation = get_pchg."
  - name: out_wfc_norm
    category: Output information
    type: String
    description: |
      Specifies the electronic states to calculate the real-space wave function modulus (norm, or known as the envelope function) with state index. The syntax and state selection rules are identical to out_pchg, but the output is the norm of the wave function. The outputs comprise multiple .cube files following the naming convention wfi[state]s[spin]k[kpoint].cube.
    default_value: none
    unit: ""
    availability: "For both PW and LCAO. When basis_type = lcao, used when calculation = get_wf."
  - name: out_wfc_re_im
    category: Output information
    type: String
    description: |
      Specifies the electronic states to calculate the real and imaginary parts of the wave function with state index. The syntax and state selection rules are identical to out_pchg, but the output contains both the real and imaginary components of the wave function. The outputs comprise multiple .cube files following the naming convention wfi[state]s[spin]k[kpoint][re/im].cube.
    default_value: none
    unit: ""
    availability: "For both PW and LCAO. When basis_type = lcao, used when calculation = get_wf."
  - name: if_separate_k
    category: Output information
    type: Boolean
    description: |
      Specifies whether to write the partial charge densities for all k-points to individual files or merge them. Warning: Enabling symmetry may produce unwanted results due to reduced k-point weights and symmetry operations in real space. Therefore when calculating partial charge densities, if you are not sure what you want exactly, it is strongly recommended to set symmetry = -1. It is noteworthy that your symmetry setting should remain the same as that in the SCF procedure.
    default_value: "false"
    unit: ""
    availability: "For both PW and LCAO. When basis_type = pw, used if out_pchg is set. When basis_type = lcao, used only when calculation = get_pchg and gamma_only = 0."
  - name: out_elf
    category: Output information
    type: "Integer \\[Integer\\](optional)"
    description: |
      Whether to output the electron localization function (ELF) in the folder `OUT.${suffix}`. The files are named as
      * nspin = 1:
          * elf.cube: ${\rm{ELF}} = \frac{1}{1+\chi^2}$, $\chi = \frac{\frac{1}{2}\sum_{i}{f_i |\nabla\psi_{i}|^2} - \frac{|\nabla\rho|^2}{8\rho}}{\frac{3}{10}(3\pi^2)^{2/3}\rho^{5/3}}$;
      * nspin = 2:
          * elf1.cube, elf2.cube: ${\rm{ELF}}_\sigma = \frac{1}{1+\chi_\sigma^2}$, $\chi_\sigma = \frac{\frac{1}{2}\sum_{i}{f_i |\nabla\psi_{i,\sigma}|^2} - \frac{|\nabla\rho_\sigma|^2}{8\rho_\sigma}}{\frac{3}{10}(6\pi^2)^{2/3}\rho_\sigma^{5/3}}$;
          * elf.cube: ${\rm{ELF}} = \frac{1}{1+\chi^2}$, $\chi = \frac{\frac{1}{2}\sum_{i,\sigma}{f_i |\nabla\psi_{i,\sigma}|^2} - \sum_{\sigma}{\frac{|\nabla\rho_\sigma|^2}{8\rho_\sigma}}}{\sum_{\sigma}{\frac{3}{10}(6\pi^2)^{2/3}\rho_\sigma^{5/3}}}$;
      * nspin = 4 (noncollinear):
          * elf.cube: ELF for total charge density, ${\rm{ELF}} = \frac{1}{1+\chi^2}$, $\chi = \frac{\frac{1}{2}\sum_{i}{f_i |\nabla\psi_{i}|^2} - \frac{|\nabla\rho|^2}{8\rho}}{\frac{3}{10}(3\pi^2)^{2/3}\rho^{5/3}}$

      The second integer controls the precision of the kinetic energy density output, if not given, will use 3 as default. For purpose restarting from this file and other high-precision involved calculation, recommend to use 10.

      In molecular dynamics calculations, the output frequency is controlled by out_freq_ion.
    default_value: 0 3
    unit: ""
    availability: Only for Kohn-Sham DFT and Orbital Free DFT.
  - name: out_spillage
    category: Output information
    type: Integer
    description: |
      This output is only intentively needed by the ABACUS numerical atomic orbital generation workflow. This parameter is used to control whether to output the overlap integrals between truncated spherical Bessel functions (TSBFs) and plane-wave basis expanded wavefunctions (named as OVERLAP_Q), and between TSBFs (named as OVERLAP_Sq), also their first order derivatives. The output files are named starting with orb_matrix. A value of 2 would enable the output.
    default_value: "0"
    unit: ""
    availability: Only for Kohn-Sham DFT with plane-wave basis.
  - name: out_dipole
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      * True: Output electric dipole moment.
      * False: Do not output electric dipole moment.
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_current
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Integer
    description: |
      * 0: Do not output current.
      * 1: Output current using the two-center integral, faster.
      * 2: Output current using the matrix commutation, more precise.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_current_k
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      * True: Output current for each k-points separately.
      * False: Output current in total.
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_efield
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      Whether to output the electric field data to files. When enabled, writes real-time electric field values (unit: V/A) into files named efield_[num].txt, where [num] is the sequential index of the electric field ranges from 0 to N-1 for N configured fields. It is noteworthy that the field type sequence follows td_ttype, while the direction sequence follows td_vext_dire.
      * True: Output electric field.
      * False: Do not output electric field.
    default_value: "False"
    unit: ""
    availability: ""
  - name: out_vecpot
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      Output vector potential or not (unit: a.u.).
      * True: Output vector potential into file At.dat.
      * False: Do not output vector potential.
    default_value: "False"
    unit: ""
    availability: ""
  - name: cal_symm_repr
    category: System variables
    type: "Integer \\[Integer\\](optional)"
    description: |
      Whether to print the matrix representation of symmetry operation to running log file. If the first value is given as 1, then all matrix representations will be printed. The second optional parameter controls the precision (number of digits) to print, default is 3, which is enough for a quick check.
    default_value: 1 3
    unit: ""
    availability: ""
  - name: spillage_outdir
    category: Input files
    type: String
    description: |
      The directory to save the spillage files.
    default_value: "\"./\""
    unit: ""
    availability: Used only for plane wave basis set.
  - name: dos_edelta_ev
