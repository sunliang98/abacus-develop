    type: Real
    description: |
      The width of the Gaussian factor when obtaining smeared Density of States (DOS)
    default_value: "0.07"
    unit: eV
    availability: ""
  - name: dos_scale
    category: Density of states
    type: Real
    description: |
      Defines the energy range of DOS output as (emax-emin)*(1+dos_scale), centered at (emax+emin)/2. This parameter will be used when dos_emin and dos_emax are not set.
    default_value: "0.01"
    unit: eV
    availability: ""
  - name: dos_emin_ev
    category: Density of states
    type: Real
    description: |
      The minimal range for Density of States (DOS)
      * If set, "dos_scale" will be ignored.
    default_value: Minimal eigenenergy of
    unit: eV
    availability: ""
  - name: dos_emax_ev
    category: Density of states
    type: Real
    description: |
      The maximal range for Density of States (DOS)
      * If set, "dos_scale" will be ignored.
    default_value: Maximal eigenenergy of
    unit: eV
    availability: ""
  - name: dos_nche
