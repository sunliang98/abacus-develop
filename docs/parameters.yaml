    availability: ""
  - name: rdmft_power_alpha
    category: Reduced Density Matrix Functional Theory
    type: Real
    description: |
      The alpha parameter of power-functional(or other exx-type/hybrid functionals) which used in RDMFT, g(occ_number) = occ_number^alpha
    default_value: "0.656"
    unit: ""
    availability: ""
  - name: "exxace"
    category: Exact Exchange (PW)
    type: Boolean
    description: |
      Whether to use the ACE method (https://doi.org/10.1021/acs.jctc.6b00092) to accelerate the calculation the Fock exchange matrix. Should be set to true most of the time.
      * True: Use the ACE method to calculate the Fock exchange operator.
      * False: Use the traditional method to calculate the Fock exchange operator.
    default_value: "True"
    unit: ""
    availability: exx_separate_loop==True.
  - name: exx_gamma_extrapolation
    category: Exact Exchange (PW)
    type: Boolean
    description: |
      Whether to use the gamma point extrapolation method to calculate the Fock exchange operator. See https://doi.org/10.1103/PhysRevB.79.205114 for details. Should be set to true most of the time.
    default_value: "True"
    unit: ""
    availability: ""
  - name: ecutexx
    category: Exact Exchange (PW)
    type: Real
    description: |
      The energy cutoff for EXX (Fock) exchange operator in plane wave basis calculations. Reducing ecutexx below ecutrho may significantly accelerate EXX computations. This speed improvement comes with a reduced numerical accuracy in the exchange energy calculation.
    default_value: same as ecutrho
    unit: Ry
    availability: ""
  - name: exx_thr_type
    category: Exact Exchange (PW)
    type: String
    description: |
      The type of threshold used to judge whether the outer loop has converged in the separate loop EXX calculation.
      * energy: use the change of exact exchange energy to judge convergence.
      * density: if the change of charge density difference between two successive outer loop iterations is seen as converged according to scf_thr, then the outer loop is seen as converged.
    default_value: density
    unit: ""
    availability: ""
  - name: exx_ene_thr
    category: Exact Exchange (PW)
    type: Real
    description: |
      The threshold for the change of exact exchange energy to judge convergence of the outer loop in the separate loop EXX calculation.
    default_value: "1e-5"
    unit: Ry
    availability: exx_thr_type==energy
