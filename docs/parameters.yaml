# Auto-generated by: abacus --generate-parameters-yaml
# Do not edit manually.
parameters:
  - name: suffix
    category: System variables
    type: String
    description: |
      In each run, ABACUS will generate a subdirectory in the working directory. This subdirectory contains all the information of the run. The subdirectory name has the format: OUT.suffix, where the suffix is the name you can pick up for your convenience.
    default_value: ABACUS
    unit: ""
    availability: ""
  - name: ntype
    category: System variables
    type: Integer
    description: |
      Number of different atom species in the calculation.
    default_value: "0"
    unit: ""
    availability: ""
  - name: calculation
    category: System variables
    type: String
    description: |
      Specify the type of calculation.

      * scf: perform self-consistent electronic structure calculations
      * nscf: perform non-self-consistent electronic structure calculations. A charge density file is required
      * relax: perform structure relaxation calculations, the relax_nmax parameter depicts the maximal number of ionic iterations
      * cell-relax: perform cell relaxation calculations
      * md: perform molecular dynamics simulations
      * get_pchg: obtain partial (band-decomposed) charge densities (for LCAO basis only). See out_pchg for more information
      * get_wf: obtain real space wave functions (for LCAO basis only). See out_wfc_norm and out_wfc_re_im for more information
      * get_s: obtain the overlap matrix formed by localized orbitals (for LCAO basis with multiple k points). the file name is SR.csr with file format being the same as that generated by out_mat_hs2
      * gen_bessel: generates projectors, i.e., a series of Bessel functions, for the DeePKS method (for LCAO basis only)
      * gen_opt_abfs: generate opt-ABFs as discussed in this article
      * test_memory: obtain a rough estimation of memory consumption for the calculation
      * test_neighbour: obtain information of neighboring atoms (for LCAO basis only), please specify a positive search_radius manually
    default_value: scf
    unit: ""
    availability: ""
  - name: esolver_type
    category: System variables
    type: String
    description: |
      Choose the energy solver.
      * ksdft: Kohn-Sham density functional theory
      * ofdft: orbital-free density functional theory
      * tdofdft: time-dependent orbital-free density functional theory
      * sdft: stochastic density functional theory
      * tddft: real-time time-dependent density functional theory (RT-TDDFT)
      * lj: Leonard Jones potential
      * dp: DeeP potential
      * nep: Neuroevolution Potential
      * ks-lr: Kohn-Sham density functional theory + LR-TDDFT (Under Development Feature)
      * lr: LR-TDDFT with given KS orbitals (Under Development Feature)
    default_value: ksdft
    unit: ""
    availability: ""
  - name: symmetry
    category: System variables
    type: String
    description: |
      Takes value 1, 0 or -1.
      * -1: No symmetry will be considered. It is recommended to set -1 for non-colinear + soc calculations, where time reversal symmetry is broken sometimes.
      * 0: Only time reversal symmetry would be considered in symmetry operations, which implied k point and -k point would be treated as a single k point with twice the weight.
      * 1: Symmetry analysis will be performed to determine the type of Bravais lattice and associated symmetry operations. (point groups, space groups, primitive cells, and irreducible k-points)

      [NOTE] When symmetry is enabled (value 1), k-points are reduced to the irreducible Brillouin zone (IBZ). For explicit k-point lists with custom weights (see KPT file), the custom weights are preserved during symmetry reduction. For Monkhorst-Pack grids, uniform weights are used.
    default_value: default
    unit: ""
    availability: ""
  - name: symmetry_prec
    category: System variables
    type: Real
    description: |
      The accuracy for symmetry analysis. Typically, the default value is good enough, but if the lattice parameters or atom positions in STRU file are not accurate enough, this value should be enlarged.
      [NOTE] Note: if calculation==cell_relax, this value can be dynamically changed corresponding to the variation of accuracy of the lattice parameters and atom positions during the relaxation.
    default_value: "1.0e-6"
    unit: Bohr
    availability: ""
  - name: symmetry_autoclose
    category: System variables
    type: Boolean
    description: |
      Control how to deal with error in symmetry analysis due to inaccurate lattice parameters or atom positions in STRU file, especially useful when calculation==cell-relax
      * False: quit with an error message
      * True: automatically set symmetry to 0 and continue running without symmetry analysis
    default_value: "True"
    unit: ""
    availability: symmetry==1
  - name: cal_force
    category: System variables
    type: Boolean
    description: |
      If set to True, calculate the force at the end of the electronic iteration.
    default_value: "False"
    unit: ""
    availability: ""
  - name: kpar
    category: System variables
    type: Integer
    description: |
      Divide all processors into kpar groups, and k points will be distributed among each group. The value taken should be less than or equal to the number of k points as well as the number of MPI processes.
    default_value: "1"
    unit: ""
    availability: ""
  - name: bndpar
    category: System variables
    type: Integer
    description: |
      Divide all processors into bndpar groups, and bands (only stochastic orbitals now) will be distributed among each group. It should be larger than 0.
    default_value: "1"
    unit: ""
    availability: ""
  - name: latname
    category: System variables
    type: String
    description: |
      Specifies the type of Bravias lattice. When set to none, the three lattice vectors are supplied explicitly in STRU file.

      Available options are:
      * none: free structure
      * sc: simple cubic
      * fcc: face-centered cubic
      * bcc: body-centered cubic
      * hexagonal: hexagonal
      * trigonal: trigonal
      * st: simple tetragonal
      * bct: body-centered tetragonal
      * so: orthorhombic
      * baco: base-centered orthorhombic
      * fco: face-centered orthorhombic
      * bco: body-centered orthorhombic
      * sm: simple monoclinic
      * bacm: base-centered monoclinic
      * triclinic: triclinic
    default_value: none
    unit: ""
    availability: ""
  - name: init_wfc
    category: System variables
    type: String
    description: |
      The type of the starting wave functions.

      Available options are:
      * atomic: from atomic pseudo wave functions. If they are not enough, other wave functions are initialized with random numbers.
      * atomic+random: add small random numbers on atomic pseudo-wavefunctions
      * file: from binary files wf*.dat, which are output by setting out_wfc_pw to 2.
      * random: random numbers
      * nao: from numerical atomic orbitals. If they are not enough, other wave functions are initialized with random numbers.
      * nao+random: add small random numbers on numerical atomic orbitals

      [NOTE] Only the file option is useful for the lcao basis set, which is mostly used when calculation is set to get_wf and get_pchg.
    default_value: atomic
    unit: ""
    availability: ""
  - name: init_chg
    category: System variables
    type: String
    description: |
      This variable is used for both plane wave set and localized orbitals set. It indicates the type of starting density.

      * atomic: the density is starting from the summation of the atomic density of single atoms.
      * file: the density will be read in from a binary file charge-density.dat first. If it does not exist, the charge density will be read in from cube files.
      * wfc: the density will be calculated by wavefunctions and occupations.
      * dm: the density will be calculated by real space density matrix(DMR) of LCAO base.
      * hr: the real space Hamiltonian matrix(HR) will be read in from file hrs1_nao.csr in directory read_file_dir.
      * auto: Abacus first attempts to read the density from a file; if not found, it defaults to using atomic density.
    default_value: atomic
    unit: ""
    availability: ""
  - name: init_vel
    category: System variables
    type: Boolean
    description: |
      * True: read the atom velocity (atomic unit : 1 a.u. = 21.877 Angstrom/fs) from the atom file (STRU) and determine the initial temperature md_tfirst. If md_tfirst is unset or less than zero, init_vel is autoset to be true.
      * False: assign value to atom velocity using Gaussian distributed random numbers.
    default_value: "False"
    unit: ""
    availability: ""
  - name: mem_saver
    category: System variables
    type: Integer
    description: |
      Save memory when performing nscf calculations.
      * 0: no memory saving techniques are used.
      * 1: a memory saving technique will be used for many k point calculations.
    default_value: "0"
    unit: ""
    availability: Used only for nscf calculations with plane wave basis set.
  - name: cal_stress
    category: System variables
    type: Boolean
    description: |
      If set to True, calculate the stress at the end of the electronic iteration.
    default_value: "False"
    unit: ""
    availability: ""
  - name: diago_proc
    category: System variables
    type: Integer
    description: |
      * 0: it will be set to the number of MPI processes.
      * >0: it specifies the number of processes used for carrying out diagonalization. Must be less than or equal to total number of MPI processes.
    default_value: "0"
    unit: ""
    availability: Used only for plane wave basis set.
  - name: nbspline
    category: System variables
    type: Integer
    description: |
      If set to a natural number, a Cardinal B-spline interpolation will be used to calculate Structure Factor. nbspline represents the order of B-spline basis and a larger one can get more accurate results but cost more. It is turned off by default.
    default_value: "-1"
    unit: ""
    availability: ""
  - name: kspacing
    category: System variables
    type: Vector of Real (1 or 3 values)
    description: |
      Set the smallest allowed spacing between k points, unit in 1/bohr. It should be larger than 0.0, and suggest smaller than 0.25. When you have set this value > 0.0, then the KPT file is unnecessary. The default value 0.0 means that ABACUS will read the applied KPT file.

      [NOTE] If gamma_only is set to be true, kspacing is invalid.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: min_dist_coef
    category: System variables
    type: Real
    description: |
      A factor related to the allowed minimum distance between two atoms. At the beginning, ABACUS will check the structure, and if the distance of two atoms is shorter than min_dist_coef*(standard covalent bond length), we think this structure is unreasonable.
    default_value: "0.2"
    unit: ""
    availability: ""
  - name: device
    category: System variables
    type: String
    description: |
      Specifies the computing device for ABACUS.

      Available options are:
      * cpu: for CPUs via Intel, AMD, or Other supported CPU devices
      * gpu: for GPUs via CUDA or ROCm.

      [NOTE] ks_solver must also be set to the algorithms supported. lcao_in_pw currently does not support gpu.
    default_value: cpu
    unit: ""
    availability: ""
  - name: precision
    category: System variables
    type: String
    description: |
      Specifies the precision when performing scf calculation.
      * single: single precision
      * double: double precision
    default_value: double
    unit: ""
    availability: Used only for plane wave basis set.
  - name: gint_precision
    category: System variables
    type: String
    description: |
      Specifies the precision when performing grid integral in LCAO calculations.
      * single: single precision
      * double: double precision
      * mix: mixed precision, starting from single precision and switching to double precision when the SCF residual becomes small enough
    default_value: double
    unit: ""
    availability: Used only for LCAO basis set on CPU.
  - name: timer_enable_nvtx
    category: System variables
    type: Boolean
    description: |
      Controls whether NVTX profiling labels are emitted by the timer. This feature is only effective on CUDA platforms.

      * True: Enable NVTX profiling labels in the timer.
      * False: Disable NVTX profiling labels in the timer.
    default_value: "False"
    unit: ""
    availability: ""
  - name: cell_factor
    category: System variables
    type: Real
    description: |
      Used in the construction of the pseudopotential tables. For cell-relax calculations, this is automatically set to 2.0.
    default_value: "1.2"
    unit: ""
    availability: ""
  - name: dm_to_rho
    category: System variables
    type: Boolean
    description: |
      Reads density matrix in npz format and calculates electron density.
    default_value: "False"
    unit: ""
    availability: ""
  - name: chg_extrap
    category: System variables
    type: String
    description: |
      Charge extrapolation method for MD and relaxation calculations.
    default_value: default
    unit: ""
    availability: ""
  - name: ecutwfc
    category: Plane wave related variables
    type: Real
    description: |
      Energy cutoff for plane wave functions. Note that even for localized orbitals basis, you still need to setup an energy cutoff for this system. Because our local pseudopotential parts and the related force are calculated from plane wave basis set.
      [NOTE] ecutwfc and ecutrho can be set simultaneously. If only one parameter is set, abacus will automatically set another parameter based on the 4-time relationship.
    default_value: "50 for PW basis, 100 for LCAO basis"
    unit: Ry
    availability: ""
  - name: ecutrho
    category: Plane wave related variables
    type: Real
    description: |
      Energy cutoff for charge density and potential. For norm-conserving pseudopotential you should stick to the default value, you can reduce it by a little but it will introduce noise especially on forces and stress.
    default_value: "4*ecutwfc"
    unit: Ry
    availability: ""
  - name: nx
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points in x direction. If set to 0, the number will be calculated from ecutrho.

      [NOTE] You must specify all three dimensions (nx, ny, nz) for this setting to be used.
    default_value: "0"
    unit: ""
    availability: ""
  - name: ny
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points in y direction. If set to 0, the number will be calculated from ecutrho.

      [NOTE] You must specify all three dimensions (nx, ny, nz) for this setting to be used.
    default_value: "0"
    unit: ""
    availability: ""
  - name: nz
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points in z direction. If set to 0, the number will be calculated from ecutrho.

      [NOTE] You must specify all three dimensions (nx, ny, nz) for this setting to be used.
    default_value: "0"
    unit: ""
    availability: ""
  - name: ndx
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points for the dense part of charge density in x direction. If set to 0, the number will be calculated from ecutwfc.

      [NOTE] You must specify all three dimensions (ndx, ndy, ndz) for this setting to be used. These parameters must be used combined with nx, ny, nz. If nx, ny, nz are unset, ndx, ndy, ndz are used as nx, ny, nz.
    default_value: "0"
    unit: ""
    availability: ""
  - name: ndy
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points for the dense part of charge density in y direction. If set to 0, the number will be calculated from ecutwfc.

      [NOTE] You must specify all three dimensions (ndx, ndy, ndz) for this setting to be used. These parameters must be used combined with nx, ny, nz. If nx, ny, nz are unset, ndx, ndy, ndz are used as nx, ny, nz.
    default_value: "0"
    unit: ""
    availability: ""
  - name: ndz
    category: Plane wave related variables
    type: Integer
    description: |
      If set to a positive number, specifies the number of FFT grid points for the dense part of charge density in z direction. If set to 0, the number will be calculated from ecutwfc.

      [NOTE] You must specify all three dimensions (ndx, ndy, ndz) for this setting to be used. These parameters must be used combined with nx, ny, nz. If nx, ny, nz are unset, ndx, ndy, ndz are used as nx, ny, nz.
    default_value: "0"
    unit: ""
    availability: ""
  - name: pw_seed
    category: Plane wave related variables
    type: Integer
    description: |
      Specify the random seed to initialize wave functions. Only positive integers are available.
    default_value: "0"
    unit: ""
    availability: Only used for plane wave basis.
  - name: diag_subspace
    category: Plane wave related variables
    type: Integer
    description: |
      The method to diagonalize subspace in dav_subspace method.
      * 0: by LAPACK
      * 1: by GenELPA
      * 2: by ScaLAPACK
    default_value: "0"
    unit: ""
    availability: ""
  - name: erf_ecut
    category: Plane wave related variables
    type: Real
    description: |
      Used in variable-cell molecular dynamics (or in stress calculation). See erf_sigma for details.
    default_value: "0.0"
    unit: Ry
    availability: ""
  - name: fft_mode
    category: Plane wave related variables
    type: Integer
    description: |
      Set the mode of FFTW.
      * 0: FFTW_ESTIMATE
      * 1: FFTW_MEASURE
      * 2: FFTW_PATIENT
      * 3: FFTW_EXHAUSTIVE
    default_value: "0"
    unit: ""
    availability: ""
  - name: erf_height
    category: Plane wave related variables
    type: Real
    description: |
      Used in variable-cell molecular dynamics (or in stress calculation). See erf_sigma for details.
    default_value: "0.0"
    unit: Ry
    availability: ""
  - name: erf_sigma
    category: Plane wave related variables
    type: Real
    description: |
      In order to recover the accuracy of a constant energy cutoff calculation, the kinetic functional is modified, which is used in variable-cell molecular dynamics (or in stress calculation).
    default_value: "0.1"
    unit: Ry
    availability: ""
  - name: stru_file
    category: Input files
    type: String
    description: |
      The name of the structure file containing various information about atom species, including pseudopotential files, local orbitals files, cell information, atom positions, and whether atoms should be allowed to move.
    default_value: STRU
    unit: ""
    availability: ""
  - name: kpoint_file
    category: Input files
    type: String
    description: |
      The name of the k-point file that includes the k-point information of Brillouin zone.
    default_value: KPT
    unit: ""
    availability: ""
  - name: pseudo_dir
    category: Input files
    type: String
    description: |
      The directory of pseudopotential files. This parameter is combined with the pseudopotential filenames in the STRU file to form the complete pseudopotential file paths.
    default_value: "\"\""
    unit: ""
    availability: ""
  - name: orbital_dir
    category: Input files
    type: String
    description: |
      The directory to save numerical atomic orbitals. This parameter is combined with orbital filenames in the STRU file to form the complete orbital file paths.
    default_value: "\"\""
    unit: ""
    availability: ""
  - name: read_file_dir
    category: Input files
    type: String
    description: |
      Location of files, such as the electron density (chgs1.cube), required as a starting point.
    default_value: OUT.$suffix
    unit: ""
    availability: ""
  - name: restart_load
    category: Input files
    type: Boolean
    description: |
      If restart_save is set to true and an electronic iteration is finished, calculations can be restarted from the charge density file, which are saved in the former calculation.
    default_value: "False"
    unit: ""
    availability: Used only when numerical atomic orbitals are employed as basis set.
  - name: basis_type
    category: Electronic structure
    type: String
    description: |
      Choose the basis set.
      * pw: Using plane-wave basis set only.
      * lcao: Using localized atomic orbital sets.
      * lcao_in_pw: Expand the localized atomic set in plane-wave basis, non-self-consistent field calculation not tested.
    default_value: pw
    unit: ""
    availability: ""
  - name: ks_solver
    category: Electronic structure
    type: String
    description: |
      Choose the diagonalization methods for the Hamiltonian matrix expanded in a certain basis set.

      For plane-wave basis,

      * cg: The conjugate-gradient (CG) method.
      * bpcg: The BPCG method, which is a block-parallel Conjugate Gradient (CG) method, typically exhibits higher acceleration in a GPU environment.
      * dav: The Davidson algorithm.
      * dav_subspace: The Davidson algorithm without orthogonalization operation, this method is the most recommended for efficiency. `pw_diag_ndim` can be set to 2 for this method.

      For numerical atomic orbitals basis,

      * lapack: Use LAPACK to diagonalize the Hamiltonian, only used for serial version
      * genelpa: Use GEN-ELPA to diagonalize the Hamiltonian.
      * scalapack_gvx: Use Scalapack to diagonalize the Hamiltonian.
      * cusolver: Use CUSOLVER to diagonalize the Hamiltonian, at least one GPU is needed.
      * cusolvermp: Use CUSOLVER to diagonalize the Hamiltonian, supporting multi-GPU devices. Note that you should set the number of MPI processes equal to the number of GPUs.
      * elpa: The ELPA solver supports both CPU and GPU. By setting the `device` to GPU, you can launch the ELPA solver with GPU acceleration (provided that you have installed a GPU-supported version of ELPA, which requires you to manually compile and install ELPA, and the ABACUS should be compiled with -DUSE_ELPA=ON and -DUSE_CUDA=ON). The ELPA solver also supports multi-GPU acceleration.

      If you set ks_solver=`genelpa` for basis_type=`pw`, the program will stop with an error message:

      ``text genelpa can not be used with plane wave basis. ``

      Then the user has to correct the input file and restart the calculation.
    default_value: "\n    - PW basis: cg.\n    - LCAO basis:\n        - genelpa (if compiling option `USE_ELPA` has been set)\n        - lapack (if compiling option `ENABLE_MPI` has not been set)\n        - scalapack_gvx (if compiling option `USE_ELPA` has not been set and compiling option `ENABLE_MPI` has been set)\n        - cusolver (if compiling option `USE_CUDA` has been set)"
    unit: ""
    availability: ""
  - name: nbands
    category: Electronic structure
    type: Integer
    description: |
      The number of Kohn-Sham orbitals to calculate. It is recommended to setup this value, especially when smearing techniques are utilized, more bands should be included.
    default_value: ""
    unit: ""
    availability: ""
  - name: nelec
    category: Electronic structure
    type: Real
    description: |
      * 0.0: The total number of electrons will be calculated by the sum of valence electrons (i.e. assuming neutral system).
      * >0.0: this denotes the total number of electrons in the system. Must be less than 2*nbands.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: nelec_delta
    category: Electronic structure
    type: Real
    description: |
      The total number of electrons will be calculated by nelec+nelec_delta.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: nupdown
    category: Electronic structure
    type: Real
    description: |
      * 0.0: no constrain apply to system.
      * >0.0: The different number of electrons between spin-up and spin-down channels. The range of value must be in [-nelec ~ nelec]. It is one type of constrainted DFT method, two Fermi energies will be calculated.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: dft_functional
    category: Electronic structure
    type: String
    description: |
      In our package, the XC functional can either be set explicitly using the dft_functional keyword in INPUT file. If dft_functional is not specified, ABACUS will use the xc functional indicated in the pseudopotential file. On the other hand, if dft_functional is specified, it will overwrite the functional from pseudopotentials and performs calculation with whichever functional the user prefers. We further offer two ways of supplying exchange-correlation functional. The first is using 'short-hand' names. A complete list of 'short-hand' expressions can be found in the source code. Supported density functionals are:
      * LDA functionals
        * LDA (equivalent with PZ and SLAPZNOGXNOGC), PWLDA
      * GGA functionals
        * PBE (equivalent with SLAPWPBXPBC), PBESOL, REVPBE, WC, BLYP, BP(referred to BP86), PW91, HCTH, OLYP, BLYP_LR
      * meta-GGA functionals
        * SCAN (require LIBXC)
      * Hybrid functionals
        * PBE0, HF
        * If LIBXC is available, additional short-hand names of hybrid functionals are supported: HSE(referred to HSE06), B3LYP, LC_PBE, LC_WPBE, LRC_WPBE, LRC_WPBEH, CAM_PBEH, WP22, CWP22, MULLER (equivalent with POWER)
      * Hybrid meta-GGA functionals
        * SCAN0 (require LIBXC)

      The other way is only available when compiling with LIBXC, and it allows for supplying exchange-correlation functionals as combinations of LIBXC keywords for functional components, joined by a plus sign, for example, dft_functional='LDA_X_1D_EXPONENTIAL+LDA_C_1D_CSC'.
    default_value: Used the same as DFT functional as specified in the pseudopotential files.
    unit: ""
    availability: ""
  - name: xc_temperature
    category: Electronic structure
    type: Real
    description: |
      Specifies temperature when using temperature-dependent XC functionals (KSDT and so on).
    default_value: "0.0"
    unit: Ry
    availability: ""
  - name: xc_exch_ext
    category: Electronic structure
    type: Integer followed by Real values
    description: |
      Customized parameterization on the exchange part of XC functional. The first value should be the LibXC ID of the original functional, and latter values are external parameters. Default values are those of Perdew-Burke-Ernzerhof (PBE) functional. For more information on LibXC ID of functionals, please refer to LibXC. For parameters of functionals of interest, please refer to the source code of LibXC, such as PBE functional interface in LibXC: gga_x_pbe.c.

      [NOTE] Solely setting this keyword will take no effect on XC functionals. One should also set dft_functional to the corresponding functional to apply the customized parameterization. Presently this feature can only support parameterization on one exchange functional.
    default_value: 101 0.8040 0.2195149727645171
    unit: ""
    availability: ""
  - name: xc_corr_ext
    category: Electronic structure
    type: Integer followed by Real values
    description: |
      Customized parameterization on the correlation part of XC functional. The first value should be the LibXC ID of the original functional, and latter values are external parameters. Default values are those of Perdew-Burke-Ernzerhof (PBE) functional. For more information on LibXC ID of functionals, please refer to LibXC. For parameters of functionals of interest, please refer to the source code of LibXC, such as PBE functional interface in LibXC: gga_c_pbe.c.

      [NOTE] Solely setting this keyword will take no effect on XC functionals. One should also set dft_functional to the corresponding functional to apply the customized parameterization. Presently this feature can only support parameterization on one correlation functional.
    default_value: 130 0.06672455060314922 0.031090690869654895034 1.0
    unit: ""
    availability: ""
  - name: pseudo_rcut
    category: Electronic structure
    type: Real
    description: |
      Cut-off of radial integration for pseudopotentials.
    default_value: "15"
    unit: Bohr
    availability: ""
  - name: pseudo_mesh
    category: Electronic structure
    type: Boolean
    description: |
      * 0: Use a mesh for radial integration of pseudopotentials.
      * 1: Use the mesh that is consistent with quantum espresso
    default_value: "0"
    unit: ""
    availability: ""
  - name: nspin
    category: Electronic structure
    type: Integer
    description: |
      The number of spin components of wave functions.
      * 1: Spin degeneracy
      * 2: Collinear spin polarized.
      * 4: For the case of noncollinear polarized, nspin will be automatically set to 4 without being specified by the user.
    default_value: "1"
    unit: ""
    availability: ""
  - name: smearing_method
    category: Electronic structure
    type: String
    description: |
      It indicates which occupation and smearing method is used in the calculation.
      * fixed: fixed occupations (available for non-coductors only)
      * gauss or gaussian: Gaussian smearing method.
      * mp: methfessel-paxton smearing method; recommended for metals.
      * mp2: 2-nd methfessel-paxton smearing method; recommended for metals.
      * mv or cold: marzari-vanderbilt smearing method.
      * fd: Fermi-Dirac smearing method: and smearing_sigma below is the temperature (in Ry).
    default_value: gauss
    unit: ""
    availability: ""
  - name: smearing_sigma
    category: Electronic structure
    type: Real
    description: |
      Energy range for smearing.
    default_value: "0.015"
    unit: Ry
    availability: ""
  - name: smearing_sigma_temp
    category: Electronic structure
    type: Real
    description: |
      Energy range for smearing, smearing_sigma = 1/2 kB smearing_sigma_temp.
    default_value: "2 * smearing_sigma / kB."
    unit: K
    availability: ""
  - name: mixing_type
    category: Electronic structure
    type: String
    description: |
      Charge mixing methods.
      * plain: Just simple mixing.
      * pulay: Standard Pulay method. P. Pulay Chemical Physics Letters, (1980)
      * broyden: Simplified modified Broyden method. D.D. Johnson Physical Review B (1988)

      In general, the convergence of the Broyden method is slightly faster than that of the Pulay method.
    default_value: broyden
    unit: ""
    availability: ""
  - name: mixing_beta
    category: Electronic structure
    type: Real
    description: |
      In general, the formula of charge mixing can be written as rho_new = rho_old + mixing_beta * drho, where rho_new represents the new charge density after charge mixing, rho_old represents the charge density in previous step, drho is obtained through various mixing methods, and mixing_beta is set by this parameter. A lower value of 'mixing_beta' results in less influence of drho on rho_new, making the self-consistent field (SCF) calculation more stable. However, it may require more steps to achieve convergence. We recommend the following options:
      * 0.8: nspin=1
      * 0.4: nspin=2 and nspin=4
      * 0: keep charge density unchanged, usually used for restarting with init_chg=file or testing.
      * 0.1 or less: if convergence of SCF calculation is difficult to reach, please try 0 < mixing_beta < 0.1.

      Note: For low-dimensional large systems, the setup of mixing_beta=0.1, mixing_ndim=20, and mixing_gg0=1.0 usually works well.
    default_value: "0.8 for nspin=1, 0.4 for nspin=2 and nspin=4."
    unit: ""
    availability: ""
  - name: mixing_beta_mag
    category: Electronic structure
    type: Real
    description: |
      Mixing parameter of magnetic density.
    default_value: "4*mixing_beta, but the maximum value is 1.6."
    unit: ""
    availability: ""
  - name: mixing_ndim
    category: Electronic structure
    type: Integer
    description: |
      It indicates the mixing dimensions in Pulay or Broyden. Pulay and Broyden method use the density from previous mixing_ndim steps and do a charge mixing based on this density.

      For systems that are difficult to converge, one could try increasing the value of 'mixing_ndim' to enhance the stability of the self-consistent field (SCF) calculation.
    default_value: "8"
    unit: ""
    availability: ""
  - name: mixing_restart
    category: Electronic structure
    type: Real
    description: |
      If the density difference between input and output drho is smaller than mixing_restart, SCF will restart at next step which means SCF will restart by using output charge density from perivos iteration as input charge density directly, and start a new mixing. Notice that mixing_restart will only take effect once in one SCF.
    default_value: "0"
    unit: ""
    availability: ""
  - name: mixing_dmr
    category: Electronic structure
    type: Boolean
    description: |
      At n-th iteration which is calculated by drho<mixing_restart, SCF will start a mixing for real-space density matrix by using the same coefficiences as the mixing of charge density.
    default_value: "false"
    unit: ""
    availability: "Only for mixing_restart >= 0.0"
  - name: mixing_gg0
    category: Electronic structure
    type: Real
    description: |
      Whether to perfom Kerker scaling for charge density.
      * >0: The high frequency wave vectors will be suppressed by multiplying a scaling factor. Setting mixing_gg0 = 1.0 is normally a good starting point. Kerker preconditioner will be automatically turned off if mixing_beta <= 0.1.
      * 0: No Kerker scaling is performed.

      For systems that are difficult to converge, particularly metallic systems, enabling Kerker scaling may aid in achieving convergence.
    default_value: "1.0"
    unit: ""
    availability: ""
  - name: mixing_gg0_mag
    category: Electronic structure
    type: Real
    description: |
      Whether to perfom Kerker preconditioner of magnetic density. Note: we do not recommand to open Kerker preconditioner of magnetic density unless the system is too hard to converge.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: mixing_gg0_min
    category: Electronic structure
    type: Real
    description: |
      The minimum kerker coefficient.
    default_value: "0.1"
    unit: ""
    availability: ""
  - name: mixing_angle
    category: Electronic structure
    type: Real
    description: |
      Normal broyden mixing can give the converged result for a given magnetic configuration. If one is not interested in the energies of a given magnetic configuration but wants to determine the ground state by relaxing the magnetic moments' directions, one cannot rely on the standard Broyden mixing algorithm. To enhance the ability to find correct magnetic configuration for non-colinear calculations, ABACUS implements a promising mixing method proposed by J. Phys. Soc. Jpn. 82 (2013) 114706. Here, mixing_angle is the angle mixing parameter. In fact, only mixing_angle=1.0 is implemented currently.
      * <=0: Normal broyden mixing
      * >0: Angle mixing for the modulus with mixing_angle=1.0
    default_value: "-10.0"
    unit: ""
    availability: Only relevant for non-colinear calculations nspin=4.
  - name: mixing_tau
    category: Electronic structure
    type: Boolean
    description: |
      Whether to mix the kinetic energy density.
      * True: The kinetic energy density will also be mixed. It seems for general cases, SCF converges fine even without this mixing. However, if there is difficulty in converging SCF for meta-GGA, it might be helpful to turn this on.
      * False: The kinetic energy density will not be mixed.
    default_value: "False"
    unit: ""
    availability: Only relevant for meta-GGA calculations.
  - name: mixing_dftu
    category: Electronic structure
    type: Boolean
    description: |
      Whether to mix the occupation matrices.
      * True: The occupation matrices will also be mixed by plain mixing. From experience this is not very helpful if the +U calculation does not converge.
      * False: The occupation matrices will not be mixed.
    default_value: "False"
    unit: ""
    availability: Only relevant for DFT+U calculations.
  - name: gamma_only
    category: Electronic structure
    type: Boolean
    description: |
      Whether to use gamma_only algorithm.
      * 0: more than one k-point is used and the ABACUS is slower compared to the gamma only algorithm.
      * 1: ABACUS uses gamma only, the algorithm is faster and you don't need to specify the k-points file.

      Note: If gamma_only is set to 1, the KPT file will be overwritten. So make sure to turn off gamma_only for multi-k calculations.
    default_value: "0"
    unit: ""
    availability: Only used in localized orbitals set
  - name: scf_nmax
    category: Electronic structure
    type: Integer
    description: |
      This variable indicates the maximal iteration number for electronic iterations.
    default_value: "100"
    unit: ""
    availability: ""
  - name: scf_thr
    category: Electronic structure
    type: Real
    description: |
      It's the density threshold for electronic iteration. It represents the charge density error between two sequential densities from electronic iterations. Usually for local orbitals, usually 1e-6 may be accurate enough.
    default_value: "1.0e-9 (plane-wave basis), or 1.0e-7 (localized atomic orbital basis)."
    unit: "Ry if scf_thr_type=1, dimensionless if scf_thr_type=2"
    availability: ""
  - name: scf_ene_thr
    category: Electronic structure
    type: Real
    description: |
      It's the energy threshold for electronic iteration. It represents the total energy error between two sequential densities from electronic iterations.
    default_value: "-1.0. If the user does not set this parameter, it will not take effect."
    unit: eV
    availability: ""
  - name: scf_thr_type
    category: Electronic structure
    type: Integer
    description: |
      Choose the calculation method of convergence criterion.
      * 1: the criterion is defined in reciprocal space, which is used in SCF of PW basis with unit Ry.
      * 2: the criterion is defined in real space, where is the number of electron, which is used in SCF of LCAO with unit dimensionless.
    default_value: "1 (plane-wave basis), or 2 (localized atomic orbital basis)."
    unit: ""
    availability: ""
  - name: scf_os_stop
    category: Electronic structure
    type: Boolean
    description: |
      For systems that are difficult to converge, the SCF process may exhibit oscillations in charge density, preventing further progress toward the specified convergence criteria and resulting in continuous oscillation until the maximum number of steps is reached; this greatly wastes computational resources. To address this issue, this function allows ABACUS to terminate the SCF process early upon detecting oscillations, thus reducing subsequent meaningless calculations. The detection of oscillations is based on the slope of the logarithm of historical drho values. To this end, Least Squares Method is used to calculate the slope of the logarithmically taken drho for the previous scf_os_ndim iterations. If the calculated slope is larger than scf_os_thr, stop the SCF.

      * 0: The SCF will continue to run regardless of whether there is oscillation or not.
      * 1: If the calculated slope is larger than scf_os_thr, stop the SCF.
    default_value: "false"
    unit: ""
    availability: ""
  - name: scf_os_thr
    category: Electronic structure
    type: Real
    description: |
      The slope threshold to determine if the SCF is stuck in a charge density oscillation. If the calculated slope is larger than scf_os_thr, stop the SCF.
    default_value: "-0.01"
    unit: ""
    availability: ""
  - name: scf_os_ndim
    category: Electronic structure
    type: Integer
    description: |
      To determine the number of old iterations' drho used in slope calculations.
    default_value: mixing_ndim
    unit: ""
    availability: ""
  - name: sc_os_ndim
    category: Electronic structure
    type: Integer
    description: |
      To determine the number of old iterations to judge oscillation, it occured, more accurate lambda with DeltaSpin method would be calculated, only for PW base.
    default_value: "5"
    unit: ""
    availability: ""
  - name: lspinorb
    category: Electronic structure
    type: Boolean
    description: |
      Whether to consider spin-orbit coupling (SOC) effect in the calculation.
      * True: Consider spin-orbit coupling effect. When enabled:
        * nspin is automatically set to 4 (noncollinear spin representation)
        * Symmetry is automatically disabled (SOC breaks inversion symmetry)
        * Requires full-relativistic pseudopotentials with has_so=true in the UPF header
      * False: Do not consider spin-orbit coupling effect.
      * Common Error: "no soc upf used for lspinorb calculation" - ensure you are using full-relativistic pseudopotentials
    default_value: "False"
    unit: ""
    availability: ""
  - name: noncolin
    category: Electronic structure
    type: Boolean
    description: |
      Whether to allow non-collinear magnetic moments, where magnetization can point in arbitrary directions (x, y, z components) rather than being constrained to the z-axis.
      * True: Allow non-collinear polarization. When enabled:
        * nspin is automatically set to 4
        * Wave function dimension is doubled (npol=2), and the number of occupied states is doubled
        * Charge density has 4 components (Pauli spin matrices)
        * Cannot be used with gamma_only=true
        * Can be combined with lspinorb=true for SOC effects with non-collinear magnetism
      * False: Do not allow non-collinear polarization (magnetization constrained to z-axis).
      * Relationship with lspinorb:
        * noncolin=0, lspinorb=1: SOC with z-axis magnetism only (for non-magnetic materials with SOC)
        * noncolin=1, lspinorb=0: Non-collinear magnetism without SOC
        * noncolin=1, lspinorb=1: Both non-collinear magnetism and SOC
    default_value: "False"
    unit: ""
    availability: ""
  - name: soc_lambda
    category: Electronic structure
    type: Real
    description: |
      Modulates the strength of spin-orbit coupling effect. Sometimes, for some real materials, both scalar-relativistic and full-relativistic pseudopotentials cannot describe the exact spin-orbit coupling. Artificial modulation may help in such cases.

      soc_lambda, which has value range [0.0, 1.0], is used to modulate SOC effect:
      * soc_lambda 0.0: Scalar-relativistic case (no SOC)
      * soc_lambda 1.0: Full-relativistic case (full SOC)
      * Intermediate values: Partial-relativistic SOC (interpolation between scalar and full)

      Use case: When experimental or high-level theoretical results suggest that the SOC effect is weaker or stronger than what full-relativistic pseudopotentials predict, you can adjust this parameter to match the target behavior.
    default_value: "1.0"
    unit: ""
    availability: Only works when lspinorb=true
  - name: dfthalf_type
    category: Electronic structure
    type: Integer
    description: |
      DFT-1/2 type:
      * 0: DFT-1/2 is off.
      * 1: Shell DFT-1/2 method is used.
    default_value: "0"
    unit: ""
    availability: ""
  - name: pw_diag_thr
    category: Plane wave related variables
    type: Real
    description: |
      Only used when you use ks_solver = cg/dav/dav_subspace/bpcg. It indicates the threshold for the first electronic iteration, from the second iteration the pw_diag_thr will be updated automatically. For nscf calculations with planewave basis set, pw_diag_thr should be <= 1e-3.
    default_value: "0.01"
    unit: ""
    availability: ""
  - name: diago_smooth_ethr
    category: Plane wave related variables
    type: Boolean
    description: |
      If TRUE, the smooth threshold strategy, which applies a larger threshold (10e-5) for the empty states, will be implemented in the diagonalization methods. (This strategy should not affect total energy, forces, and other ground-state properties, but computational efficiency will be improved.) If FALSE, the smooth threshold strategy will not be applied.
    default_value: "false"
    unit: ""
    availability: ""
  - name: use_k_continuity
    category: Plane wave related variables
    type: Boolean
    description: |
      If TRUE, the wavefunctions at k-point will be initialized from the converged wavefunctions at the nearest k-point, which can speed up the SCF convergence. Only works for PW basis.
    default_value: "false"
    unit: ""
    availability: Used only for plane wave basis set.
  - name: pw_diag_nmax
    category: Plane wave related variables
    type: Integer
    description: |
      Only useful when you use ks_solver = cg/dav/dav_subspace/bpcg. It indicates the maximal iteration number for cg/david/dav_subspace/bpcg method.
    default_value: "50"
    unit: ""
    availability: "basis_type==pw, ks_solver==cg/dav/dav_subspace/bpcg"
  - name: pw_diag_ndim
    category: Plane wave related variables
    type: Integer
    description: |
      Only useful when you use ks_solver = dav or ks_solver = dav_subspace. It indicates dimension of workspace(number of wavefunction packets, at least 2 needed) for the Davidson method. A larger value may yield a smaller number of iterations in the algorithm but uses more memory and more CPU time in subspace diagonalization.
    default_value: "4"
    unit: ""
    availability: ""
  - name: diago_cg_prec
    category: Plane wave related variables
    type: Integer
    description: |
      Preconditioner type for conjugate gradient diagonalization method.
    default_value: "1"
    unit: ""
    availability: ""
  - name: nb2d
    category: System variables
    type: Integer
    description: |
      In LCAO calculations, the Hamiltonian and overlap matrices are distributed across 2D processor grid. This parameter controls the 2D block size for distribution.
    default_value: "0"
    unit: ""
    availability: ""
  - name: lmaxmax
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      If not equals to 2, then the maximum l channels on LCAO is set to lmaxmax. If 2, then the number of l channels will be read from the LCAO data sets. Normally no input should be supplied for this variable so that it is kept as its default.
    default_value: "2."
    unit: ""
    availability: ""
  - name: lcao_ecut
    category: Numerical atomic orbitals related variables
    type: Real
    description: |
      Energy cutoff (in Ry) for two-center integrals in LCAO. The two-center integration table are obtained via a k space integral whose upper limit is about sqrt(lcao_ecut).
    default_value: ecutwfc
    unit: ""
    availability: ""
  - name: lcao_dk
    category: Numerical atomic orbitals related variables
    type: Real
    description: |
      the interval of k points for two-center integrals. The two-center integration table are obtained via a k space integral on a uniform grid with spacing lcao_dk.
    default_value: "0.01"
    unit: Bohr
    availability: ""
  - name: lcao_dr
    category: Numerical atomic orbitals related variables
    type: Real
    description: |
      r spacing of the integration table of two-center integrals.
    default_value: "0.01"
    unit: Bohr
    availability: ""
  - name: lcao_rmax
    category: Numerical atomic orbitals related variables
    type: Real
    description: |
      Maximum distance for the two-center integration table.
    default_value: "30"
    unit: Bohr
    availability: ""
  - name: search_radius
    category: Numerical atomic orbitals related variables
    type: Real
    description: |
      Searching radius in finding the neighbouring atoms. By default the radius will be automatically determined by the cutoffs of orbitals and nonlocal beta projectors.
    default_value: "-1"
    unit: Bohr
    availability: ""
  - name: "bx"
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      In the matrix operation of grid integral, bx/by/bz grids (in x, y, z directions) are treated as a whole as a matrix element. A different value will affect the calculation speed. The default is 0, which means abacus will automatically calculate these values.
    default_value: "0"
    unit: ""
    availability: ""
  - name: by
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      In the matrix operation of grid integral, bx/by/bz grids (in x, y, z directions) are treated as a whole as a matrix element. A different value will affect the calculation speed. The default is 0, which means abacus will automatically calculate these values.
    default_value: "0"
    unit: ""
    availability: ""
  - name: bz
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      In the matrix operation of grid integral, bx/by/bz grids (in x, y, z directions) are treated as a whole as a matrix element. A different value will affect the calculation speed. The default is 0, which means abacus will automatically calculate these values.
    default_value: "0"
    unit: ""
    availability: ""
  - name: elpa_num_thread
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      Number of threads used in one elpa calculation.

      If the number is below 0 or 0 or beyond the max number of threads, all elpa calculation will be using all mpi threads
    default_value: "-1"
    unit: ""
    availability: ""
  - name: num_stream
    category: Numerical atomic orbitals related variables
    type: Integer
    description: |
      The number of CUDA streams used in LCAO calculations with GPU acceleration.
    default_value: "4"
    unit: ""
    availability: ""
  - name: bessel_nao_ecut
    category: NAOs
    type: String
    description: |
      "Energy cutoff" (in Ry) of spherical Bessel functions. The number of spherical Bessel functions that constitute the radial parts of NAOs is determined by sqrt(bessel_nao_ecut)*bessel_nao_rcut/.
    default_value: ecutwfc
    unit: ""
    availability: ""
  - name: bessel_nao_tolerence
    category: NAOs
    type: Real
    description: |
      Tolerance when searching for the zeros of spherical Bessel functions.
    default_value: "1.0e-12"
    unit: ""
    availability: ""
  - name: bessel_nao_rcut
    category: NAOs
    type: Vector of Real (N values)
    description: |
      Cutoff radius (in Bohr) and the common node of spherical Bessel functions used to construct the NAOs.
    default_value: "6.0"
    unit: ""
    availability: ""
  - name: bessel_nao_smooth
    category: NAOs
    type: Boolean
    description: |
      If True, NAOs will be smoothed near the cutoff radius. See bessel_nao_rcut and bessel_nao_sigma for parameters.
    default_value: "True"
    unit: ""
    availability: ""
  - name: bessel_nao_sigma
    category: NAOs
    type: Real
    description: |
      Smoothing range (in Bohr). See also bessel_nao_smooth.
    default_value: "0.1"
    unit: ""
    availability: ""
  - name: relax_method
    category: Geometry relaxation
    type: Vector of string
    description: |
      The methods to do geometry optimization. The available algorithms depend on the relax_new setting.

      First element (algorithm selection):
      * cg: Conjugate gradient (CG) algorithm. Available for both relax_new = True (default, simultaneous optimization) and relax_new = False (nested optimization). See relax_new for implementation details.
      * bfgs: Broyden–Fletcher–Goldfarb–Shanno (BFGS) quasi-Newton algorithm. Only available when relax_new = False.
      * lbfgs: Limited-memory BFGS algorithm, suitable for large systems. Only available when relax_new = False.
      * cg_bfgs: Mixed method starting with CG and switching to BFGS when force convergence reaches relax_cg_thr. Only available when relax_new = False.
      * sd: Steepest descent algorithm. Only available when relax_new = False. Not recommended for production use.
      * fire: Fast Inertial Relaxation Engine method, a molecular-dynamics-based relaxation algorithm. Use by setting calculation to md and md_type to fire. Ionic velocities must be set in STRU file. See fire for details.

      Second element (BFGS variant, only when first element is bfgs):
      * 1: Traditional BFGS that updates the Hessian matrix B and then inverts it.
      * 2 or omitted: Default BFGS that directly updates the inverse Hessian (recommended).

      [NOTE] In the 3.10-LTS version, the type of this parameter is std::string. It can be set to "cg", "bfgs", "cg_bfgs", "bfgs_trad", "lbfgs", "sd", "fire".
    default_value: cg 1
    unit: ""
    availability: ""
  - name: relax_new
    category: Geometry relaxation
    type: Boolean
    description: |
      Controls which implementation of geometry relaxation to use. At the end of 2022, a new implementation of the Conjugate Gradient (CG) method was introduced for relax and cell-relax calculations, while the old implementation was kept for backward compatibility.


      * True (default): Use the new CG implementation with the following features:
       * Simultaneous optimization of ionic positions and cell parameters (for cell-relax)
       * Line search algorithm for step size determination
       * Only CG algorithm is available (relax_method must be cg)
       * Supports advanced cell constraints: fixed_axes = "shape", "volume", "a", "b", "c", etc.
       * Supports fixed_ibrav to maintain lattice type
       * More efficient for variable-cell relaxation
       * Step size controlled by relax_scale_force

      - False: Use the old implementation with the following features:
       * Nested optimization procedure: ionic positions optimized first, then cell parameters (for cell-relax)
       * Multiple algorithms available: cg, bfgs, lbfgs, sd, cg_bfgs
       * Limited cell constraints: only fixed_axes = "volume" is supported
       * Traditional approach with separate ionic and cell optimization steps
    default_value: "True"
    unit: ""
    availability: ""
  - name: relax_scale_force
    category: Geometry relaxation
    type: Real
    description: |
      The paramether controls the size of the first conjugate gradient step. A smaller value means the first step along a new CG direction is smaller. This might be helpful for large systems, where it is safer to take a smaller initial step to prevent the collapse of the whole configuration.
    default_value: "0.5"
    unit: ""
    availability: Only used when relax_new set to True
  - name: relax_nmax
    category: Geometry relaxation
    type: Integer
    description: |
      The maximal number of ionic iteration steps. If set to 0, the code performs a quick "dry run", stopping just after initialization. This is useful to check for input correctness and to have the summary printed.
    default_value: "1 for SCF, 50 for relax and cell-relax calcualtions"
    unit: ""
    availability: ""
  - name: relax_cg_thr
    category: Geometry relaxation
    type: Real
    description: |
      When relax_method is set to cg_bfgs, a mixed algorithm of conjugate gradient (CG) and Broyden–Fletcher–Goldfarb–Shanno (BFGS) is used. The ions first move according to the CG method, then switch to the BFGS method when the maximum force on atoms is reduced below this threshold.
    default_value: "0.5"
    unit: eV/Angstrom
    availability: Only used when relax_new = False and relax_method = cg_bfgs
  - name: force_thr
    category: Geometry relaxation
    type: Real
    description: |
      Threshold of the force convergence. The threshold is compared with the largest force among all of the atoms. The recommended value for using atomic orbitals is 0.04 eV/Angstrom (0.0016 Ry/Bohr). The parameter is equivalent to force_thr_ev except for the unit, you can choose either you like.
    default_value: "0.001"
    unit: Ry/Bohr (25.7112 eV/Angstrom)
    availability: ""
  - name: force_thr_ev
    category: Geometry relaxation
    type: Real
    description: |
      Threshold of the force convergence. The threshold is compared with the largest force among all of the atoms. The recommended value for using atomic orbitals is 0.04 eV/Angstrom (0.0016 Ry/Bohr). The parameter is equivalent to force_thr except for the unit. You may choose either you like.
    default_value: "0.0257112"
    unit: eV/Angstrom (0.03889 Ry/Bohr)
    availability: ""
  - name: force_zero_out
    category: Geometry relaxation
    type: Real
    description: |
      The atomic forces that are smaller than force_zero_out will be treated as zero.
    default_value: "0.0"
    unit: eV/Angstrom
    availability: ""
  - name: relax_bfgs_w1
    category: Geometry relaxation
    type: Real
    description: |
      Controls the Wolfe condition for the Broyden–Fletcher–Goldfarb–Shanno (BFGS) algorithm used in geometry relaxation. This parameter sets the sufficient decrease condition (c1 in Wolfe conditions). For more information, see Phys. Chem. Chem. Phys., 2000, 2, 2177.
    default_value: "0.01"
    unit: ""
    availability: Only used when relax_new = False and relax_method is bfgs or cg_bfgs
  - name: relax_bfgs_w2
    category: Geometry relaxation
    type: Real
    description: |
      Controls the Wolfe condition for the Broyden–Fletcher–Goldfarb–Shanno (BFGS) algorithm used in geometry relaxation. This parameter sets the curvature condition (c2 in Wolfe conditions). For more information, see Phys. Chem. Chem. Phys., 2000, 2, 2177.
    default_value: "0.5"
    unit: ""
    availability: Only used when relax_new = False and relax_method is bfgs or cg_bfgs
  - name: relax_bfgs_rmax
    category: Geometry relaxation
    type: Real
    description: |
      Maximum allowed total displacement of all atoms during geometry optimization. The sum of atomic displacements can increase during optimization steps but cannot exceed this value.
    default_value: "0.8"
    unit: Bohr
    availability: Only used when relax_new = False and relax_method is bfgs or cg_bfgs
  - name: relax_bfgs_rmin
    category: Geometry relaxation
    type: Real
    description: |
      Minimum allowed total displacement of all atoms. When the total atomic displacement falls below this value and force convergence is not achieved, the calculation will terminate. Note: This parameter is not used in the default BFGS algorithm (relax_method = bfgs 2 or bfgs).
    default_value: "1e-5"
    unit: Bohr
    availability: Only used when relax_new = False and relax_method = bfgs 1 (traditional BFGS)
  - name: relax_bfgs_init
    category: Geometry relaxation
    type: Real
    description: |
      Initial total displacement of all atoms in the first BFGS step. This sets the scale for the initial movement.
    default_value: "0.5"
    unit: Bohr
    availability: Only used when relax_new = False and relax_method is bfgs or cg_bfgs
  - name: stress_thr
    category: Geometry relaxation
    type: Real
    description: |
      The threshold of the stress convergence. The threshold is compared with the largest component of the stress tensor.
    default_value: "0.5"
    unit: kbar
    availability: ""
  - name: press1
    category: Geometry relaxation
    type: Real
    description: |
      The external pressures along three axes. Positive input value is taken as compressive stress.
    default_value: "0"
    unit: kbar
    availability: ""
  - name: press2
    category: Geometry relaxation
    type: Real
    description: |
      The external pressures along three axes. Positive input value is taken as compressive stress.
    default_value: "0"
    unit: kbar
    availability: ""
  - name: press3
    category: Geometry relaxation
    type: Real
    description: |
      The external pressures along three axes. Positive input value is taken as compressive stress.
    default_value: "0"
    unit: kbar
    availability: ""
  - name: fixed_axes
    category: Geometry relaxation
    type: String
    description: |
      Specifies which cell degrees of freedom are fixed during variable-cell relaxation. The available options depend on the relax_new setting:

      When relax_new = True (default), all options are available:
      * None: Default; all cell parameters can relax freely
      * volume: Relaxation with fixed volume (allows shape changes)
      * shape: Fix shape but allow volume changes (hydrostatic pressure only)
      * a: Fix the a-axis lattice vector during relaxation
      * b: Fix the b-axis lattice vector during relaxation
      * c: Fix the c-axis lattice vector during relaxation
      * ab: Fix both a and b axes during relaxation
      * ac: Fix both a and c axes during relaxation
      * bc: Fix both b and c axes during relaxation

      When relax_new = False, all options are now available:
      * None: Default; all cell parameters can relax freely
      * volume: Relaxation with fixed volume (allows shape changes). Volume is preserved by rescaling the lattice after each update.
      * shape: Fix shape but allow volume changes (hydrostatic pressure only). Stress tensor is replaced with isotropic pressure.
      * a, b, c, ab, ac, bc: Fix specific lattice vectors. Gradients for fixed vectors are set to zero.

      [NOTE] For VASP users, see the ISIF correspondence table in the geometry optimization documentation. Both implementations now support all constraint types.
    default_value: None
    unit: ""
    availability: Only used when calculation is set to cell-relax
  - name: fixed_ibrav
    category: Geometry relaxation
    type: Boolean
    description: |
      * True: the lattice type will be preserved during relaxation. The lattice vectors are reconstructed to match the specified Bravais lattice type after each update.
      * False: No restrictions are exerted during relaxation in terms of lattice type

      [NOTE] Note: it is possible to use fixed_ibrav with fixed_axes, but please make sure you know what you are doing. For example, if we are doing relaxation of a simple cubic lattice (latname = "sc"), and we use fixed_ibrav along with fixed_axes = "volume", then the cell is never allowed to move and as a result, the relaxation never converges. When both are used, fixed_ibrav is applied first, then fixed_axes = "volume" rescaling is applied.
    default_value: "False"
    unit: ""
    availability: Can be used with both relax_new = True and relax_new = False. A specific latname must be provided.
  - name: fixed_atoms
    category: Geometry relaxation
    type: Boolean
    description: |
      * True: The direct coordinates of atoms will be preserved during variable-cell relaxation.
      * False: No restrictions are exerted on positions of all atoms. However, users can still fix certain components of certain atoms by using the m keyword in STRU file. For the latter option, check the end of this instruction.
    default_value: "False"
    unit: ""
    availability: ""
  - name: md_type
    category: Molecular dynamics
    type: String
    description: |
      Control the algorithm to integrate the equation of motion for molecular dynamics (MD), see md.md in detail.

      * fire: a MD-based relaxation algorithm, named fast inertial relaxation engine.
      * nve: NVE ensemble with velocity Verlet algorithm.
      * nvt: NVT ensemble, see md_thermostat in detail.
      * npt: Nose-Hoover style NPT ensemble, see md_pmode in detail.
      * langevin: NVT ensemble with Langevin thermostat, see md_damp in detail.
      * msst: MSST method, see msst_direction, msst_vel, msst_qmass, msst_vis, msst_tscale in detail.
    default_value: nvt
    unit: ""
    availability: ""
  - name: md_nstep
    category: Molecular dynamics
    type: Integer
    description: |
      The total number of molecular dynamics steps.
    default_value: "10"
    unit: ""
    availability: ""
  - name: md_dt
    category: Molecular dynamics
    type: Real
    description: |
      The time step used in molecular dynamics calculations.
    default_value: "1.0"
    unit: fs
    availability: ""
  - name: md_thermostat
    category: Molecular dynamics
    type: String
    description: |
      Specify the temperature control method used in NVT ensemble.

      * nhc: Nose-Hoover chain, see md_tfreq and md_tchain in detail.
      * anderson: Anderson thermostat, see md_nraise in detail.
      * berendsen: Berendsen thermostat, see md_nraise in detail.
      * rescaling: velocity Rescaling method 1, see md_tolerance in detail.
      * rescale_v: velocity Rescaling method 2, see md_nraise in detail.
    default_value: nhc
    unit: ""
    availability: ""
  - name: md_tfirst
    category: Molecular dynamics
    type: Real
    description: |
      The temperature used in molecular dynamics calculations.

      If md_tfirst is unset or less than zero, init_vel is autoset to be true. If init_vel is true, the initial temperature will be determined by the velocities read from STRU. In this case, if velocities are unspecified in STRU, the initial temperature is set to zero.

      If md_tfirst is set to a positive value and init_vel is true simultaneously, please make sure they are consistent, otherwise abacus will exit immediately.

      Note that md_tlast is only used in NVT/NPT simulations. If md_tlast is unset or less than zero, md_tlast is set to md_tfirst. If md_tlast is set to be different from md_tfirst, ABACUS will automatically change the temperature from md_tfirst to md_tlast.
    default_value: No default
    unit: K
    availability: ""
  - name: md_tlast
    category: Molecular dynamics
    type: Real
    description: |
      The temperature used in molecular dynamics calculations.

      If md_tfirst is unset or less than zero, init_vel is autoset to be true. If init_vel is true, the initial temperature will be determined by the velocities read from STRU. In this case, if velocities are unspecified in STRU, the initial temperature is set to zero.

      If md_tfirst is set to a positive value and init_vel is true simultaneously, please make sure they are consistent, otherwise abacus will exit immediately.

      Note that md_tlast is only used in NVT/NPT simulations. If md_tlast is unset or less than zero, md_tlast is set to md_tfirst. If md_tlast is set to be different from md_tfirst, ABACUS will automatically change the temperature from md_tfirst to md_tlast.
    default_value: No default
    unit: K
    availability: ""
  - name: md_prec_level
    category: Molecular dynamics
    type: Integer
    description: |
      Determine the precision level of variable-cell molecular dynamics calculations.
      * 0: FFT grids do not change, only G vectors and K vectors are changed due to the change of lattice vector. This level is suitable for cases where the variation of the volume and shape is not large, and the efficiency is relatively higher.
      * 2: FFT grids change per step. This level is suitable for cases where the variation of the volume and shape is large, such as the MSST method. However, accuracy comes at the cost of efficiency.
    default_value: "0"
    unit: ""
    availability: ""
  - name: md_restart
    category: Molecular dynamics
    type: Boolean
    description: |
      Control whether to restart molecular dynamics calculations and time-dependent density functional theory calculations.
      * True: ABACUS will read in {md_step}, then read in the corresponding STRU_MD_suffix/STRU/ automatically. For tddft, ABACUS will also read in WFC_NAO_K${kpoint} of the last step (You need to set out_wfc_lcao=1 and out_app_flag=0 to obtain this file).
      * False: ABACUS will start molecular dynamics calculations normally from the first step.
    default_value: "False"
    unit: ""
    availability: ""
  - name: md_restartfreq
    category: Molecular dynamics
    type: Integer
    description: |
      The output frequency of OUT.{suffix}/STRIU/, which are used to restart molecular dynamics calculations, see md_restart in detail.
    default_value: "5"
    unit: ""
    availability: ""
  - name: md_dumpfreq
    category: Molecular dynamics
    type: Integer
    description: |
      The output frequency of OUT.${suffix}/MD_dump in molecular dynamics calculations, which including the information of lattices and atoms.
    default_value: "1"
    unit: ""
    availability: ""
  - name: dump_force
    category: Molecular dynamics
    type: Boolean
    description: |
      Whether to output atomic forces into the file OUT.${suffix}/MD_dump.
    default_value: "True"
    unit: ""
    availability: ""
  - name: dump_vel
    category: Molecular dynamics
    type: Boolean
    description: |
      Whether to output atomic velocities into the file OUT.${suffix}/MD_dump.
    default_value: "True"
    unit: ""
    availability: ""
  - name: dump_virial
    category: Molecular dynamics
    type: Boolean
    description: |
      Whether to output lattice virials into the file OUT.${suffix}/MD_dump.
    default_value: "True"
    unit: ""
    availability: ""
  - name: md_seed
    category: Molecular dynamics
    type: Integer
    description: |
      The random seed to initialize random numbers used in molecular dynamics calculations.
      * < 0: No srand() function is called.
      * >= 0: The function srand(md_seed) is called.
    default_value: "-1"
    unit: ""
    availability: ""
  - name: md_tfreq
    category: Molecular dynamics
    type: Real
    description: |
      Control the frequency of temperature oscillations during the simulation. If it is too large, the temperature will fluctuate violently; if it is too small, the temperature will take a very long time to equilibrate with the atomic system.

      Note: It is a system-dependent empirical parameter, ranging from 1/(40*md_dt) to 1/(100*md_dt). An improper choice might lead to the failure of jobs.
    default_value: 1/40/md_dt
    unit: ""
    availability: ""
  - name: md_tchain
    category: Molecular dynamics
    type: Integer
    description: |
      Number of thermostats coupled with the particles in the NVT/NPT ensemble based on the Nose-Hoover style non-Hamiltonian equations of motion.
    default_value: "1"
    unit: ""
    availability: ""
  - name: md_pmode
    category: Molecular dynamics
    type: String
    description: |
      Determine the precision level of variable-cell molecular dynamics calculations.
      * 0: FFT grids do not change, only G vectors and K vectors are changed due to the change of lattice vector. This level is suitable for cases where the variation of the volume and shape is not large, and the efficiency is relatively higher.
      * 2: FFT grids change per step. This level is suitable for cases where the variation of the volume and shape is large, such as the MSST method. However, accuracy comes at the cost of efficiency.
    default_value: iso
    unit: ""
    availability: ""
  - name: ref_cell_factor
    category: Molecular dynamics
    type: Real
    description: |
      Construct a reference cell bigger than the initial cell. The reference cell has to be large enough so that the lattice vectors of the fluctuating cell do not exceed the reference lattice vectors during MD. Typically, 1.02 ~ 1.10 is sufficient. However, the cell fluctuations depend on the specific system and thermodynamic conditions. So users must test for a proper choice. This parameters should be used in conjunction with erf_ecut, erf_height, and erf_sigma.
    default_value: "1.0"
    unit: ""
    availability: ""
  - name: md_pcouple
    category: Molecular dynamics
    type: String
    description: |
      The coupled lattice vectors will scale proportionally in NPT ensemble based on the Nose-Hoover style non-Hamiltonian equations of motion.
      * none: Three lattice vectors scale independently.
      * xyz: Lattice vectors x, y, and z scale proportionally.
      * xy: Lattice vectors x and y scale proportionally.
      * xz: Lattice vectors x and z scale proportionally.
      * yz: Lattice vectors y and z scale proportionally.
    default_value: none
    unit: ""
    availability: ""
  - name: md_pfirst
    category: Molecular dynamics
    type: Real
    description: |
      The target pressure used in NPT ensemble simulations, the default value of md_plast is md_pfirst. If md_plast is set to be different from md_pfirst, ABACUS will automatically change the target pressure from md_pfirst to md_plast.
    default_value: "-1.0"
    unit: kbar
    availability: ""
  - name: md_plast
    category: Molecular dynamics
    type: Real
    description: |
      The target pressure used in NPT ensemble simulations, the default value of md_plast is md_pfirst. If md_plast is set to be different from md_pfirst, ABACUS will automatically change the target pressure from md_pfirst to md_plast.
    default_value: "-1.0"
    unit: kbar
    availability: ""
  - name: md_pfreq
    category: Molecular dynamics
    type: Real
    description: |
      The frequency of pressure oscillations during the NPT ensemble simulation. If it is too large, the pressure will fluctuate violently; if it is too small, the pressure will take a very long time to equilibrate with the atomic system.

      Note: It is a system-dependent empirical parameter. An improper choice might lead to the failure of jobs.
    default_value: 1/400/md_dt
    unit: ""
    availability: ""
  - name: md_pchain
    category: Molecular dynamics
    type: Integer
    description: |
      The number of thermostats coupled with the barostat in the NPT ensemble based on the Nose-Hoover style non-Hamiltonian equations of motion.
    default_value: "1"
    unit: ""
    availability: ""
  - name: lj_rule
    category: Molecular dynamics
    type: Integer
    description: |
      The Lennard-Jones potential between two atoms equals: $\sigma_k\sigma(i,j)$
    default_value: "2"
    unit: ""
    availability: ""
  - name: lj_eshift
    category: Molecular dynamics
    type: Boolean
    description: |
      It True, the LJ potential is shifted by a constant such that it is zero at the cut-off distance.
    default_value: "False"
    unit: ""
    availability: ""
  - name: lj_rcut
    category: Molecular dynamics
    type: Real
    description: |
      Cut-off radius for Leonard Jones potential, beyond which the interaction will be neglected. It can be a single value, which means that all pairs of atoms types share the same cut-off radius. Otherwise, it should be a multiple-component vector, containing values, see details in lj_rule.
    default_value: No default
    unit: Angstrom
    availability: ""
  - name: lj_epsilon
    category: Molecular dynamics
    type: Real
    description: |
      The vector representing the matrix for Leonard Jones potential. See details in lj_rule.
    default_value: No default
    unit: eV
    availability: ""
  - name: lj_sigma
    category: Molecular dynamics
    type: Real
    description: |
      The vector representing the matrix for Leonard Jones potential. See details in lj_rule.
    default_value: No default
    unit: Angstrom
    availability: ""
  - name: pot_file
    category: Molecular dynamics
    type: String
    description: |
      The filename of DP/NEP potential files, see md.md in detail.
    default_value: graph.pb
    unit: ""
    availability: ""
  - name: dp_rescaling
    category: Molecular dynamics
    type: Real
    description: |
      Rescaling factor to use a temperature-dependent DP. Energy, stress and force calculated by DP will be multiplied by this factor.
    default_value: "1.0"
    unit: ""
    availability: esolver_type = dp.
  - name: dp_fparam
    category: Molecular dynamics
    type: Real
    description: |
      The frame parameter for dp potential. The array size is dim_fparam, then all frames are assumed to be provided with the same fparam.
    default_value: "{}"
    unit: ""
    availability: esolver_type = dp.
  - name: dp_aparam
    category: Molecular dynamics
    type: Real
    description: |
      The atomic parameter for dp potential. The array size can be (1) natoms x dim_aparam, then all frames are assumed to be provided with the same aparam; (2) dim_aparam, then all frames and atoms are assumed to be provided with the same aparam.
    default_value: "{}"
    unit: ""
    availability: esolver_type = dp.
  - name: msst_direction
    category: Molecular dynamics
    type: Integer
    description: |
      The direction of the shock wave in the MSST method.
      * 0: x direction
      * 1: y direction
      * 2: z direction
    default_value: "2"
    unit: ""
    availability: ""
  - name: msst_vel
    category: Molecular dynamics
    type: Real
    description: |
      The velocity of the shock wave in the MSST method.
    default_value: "0.0"
    unit: Angstrom/fs
    availability: ""
  - name: msst_vis
    category: Molecular dynamics
    type: Real
    description: |
      Artificial viscosity in the MSST method.
    default_value: "0.0"
    unit: "g/(mol*Angstrom*fs)"
    availability: ""
  - name: msst_tscale
    category: Molecular dynamics
    type: Real
    description: |
      The reduction percentage of the initial temperature used to compress volume in the MSST method.
    default_value: "0.01"
    unit: ""
    availability: ""
  - name: msst_qmass
    category: Molecular dynamics
    type: Real
    description: |
      Inertia of the extended system variable. You should set a number larger than 0.
    default_value: No default
    unit: ""
    availability: ""
  - name: md_damp
    category: Molecular dynamics
    type: Real
    description: |
      The damping parameter used to add fictitious force in the Langevin method.
    default_value: "1.0"
    unit: fs
    availability: ""
  - name: md_tolerance
    category: Molecular dynamics
    type: Real
    description: |
      The temperature tolerance for velocity rescaling. Velocities are rescaled if the current and target temperature differ more than md_tolerance.
    default_value: "100.0"
    unit: K
    availability: ""
  - name: md_nraise
    category: Molecular dynamics
    type: Integer
    description: |
      * Anderson: The "collision frequency" parameter is given as 1/md_nraise.
      * Berendsen: The "rise time" parameter is given in units of the time step: tau = md_nraise*md_dt, so md_dt/tau = 1/md_nraise.
      * Rescale_v: Every md_nraise steps the current temperature is rescaled to the target temperature.
    default_value: "1"
    unit: ""
    availability: ""
  - name: cal_syns
    category: Molecular dynamics
    type: Boolean
    description: |
      Whether to calculate and output asynchronous overlap matrix for Hefei-NAMD interface. When enabled, calculates <phi(t-1)|phi(t)> by computing overlap between basis functions at atomic positions from previous time step and current time step. The overlap is calculated by shifting atom positions backward by velocity x md_dt. Output file: OUT.*/syns_nao.csr in CSR format.

      [NOTE] Only works with LCAO basis and molecular dynamics calculations. Requires atomic velocities. Output starts from the second MD step (istep > 0).
    default_value: "False"
    unit: ""
    availability: ""
  - name: dmax
    category: Molecular dynamics
    type: Real
    description: |
      The maximum displacement of all atoms in one step. This parameter is useful when cal_syns = True.
    default_value: "0.01"
    unit: bohr
    availability: ""
  - name: of_kinetic
    category: "OFDFT: orbital free density functional theory"
    type: String
    description: |
      Kinetic energy functional type:
      * tf: Thomas-Fermi (TF) functional
      * vw: von Weizsacker (vW) functional
      * tf+: TF + vW functional
      * wt: Wang-Teter (WT) functional
      * xwm: XWM functional
      * lkt: Luo-Karasiev-Trickey (LKT) functional
      * ml: Machine learning KEDF
      * mpn: MPN KEDF (automatically sets ml parameters)
      * cpn5: CPN5 KEDF (automatically sets ml parameters)
    default_value: wt
    unit: ""
    availability: OFDFT
  - name: of_method
    category: "OFDFT: orbital free density functional theory"
    type: String
    description: |
      The optimization method used in OFDFT.
      * cg1: Polak-Ribiere. Standard CG algorithm.
      * cg2: Hager-Zhang (generally faster than cg1).
      * tn: Truncated Newton algorithm.
    default_value: tn
    unit: ""
    availability: OFDFT
  - name: of_conv
    category: "OFDFT: orbital free density functional theory"
    type: String
    description: |
      Criterion used to check the convergence of OFDFT.
      * energy: Total energy changes less than of_tole.
      * potential: The norm of potential is less than of_tolp.
      * both: Both energy and potential must satisfy the convergence criterion.
    default_value: energy
    unit: ""
    availability: OFDFT
  - name: of_tole
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Tolerance of the energy change for determining the convergence.
    default_value: "2e-6"
    unit: Ry
    availability: OFDFT
  - name: of_tolp
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Tolerance of potential for determining the convergence.
    default_value: "1e-5"
    unit: Ry
    availability: OFDFT
  - name: of_tf_weight
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Weight of TF KEDF (kinetic energy density functional).
    default_value: "1.0"
    unit: ""
    availability: "OFDFT with of_kinetic=tf, tf+, wt, xwm"
  - name: of_vw_weight
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Weight of vW KEDF (kinetic energy density functional).
    default_value: "1.0"
    unit: ""
    availability: "OFDFT with of_kinetic=vw, tf+, wt, lkt, xwm"
  - name: of_wt_alpha
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Parameter alpha of WT KEDF (kinetic energy density functional).
    default_value: ""
    unit: ""
    availability: OFDFT with of_kinetic=wt
  - name: of_wt_beta
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Parameter beta of WT KEDF (kinetic energy density functional).
    default_value: ""
    unit: ""
    availability: OFDFT with of_kinetic=wt
  - name: of_wt_rho0
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      The average density of system.
    default_value: "0.0"
    unit: Bohr^-3
    availability: OFDFT with of_kinetic=wt
  - name: of_hold_rho0
    category: "OFDFT: orbital free density functional theory"
    type: Boolean
    description: |
      Whether to fix the average density rho0.
      * True: rho0 will be fixed even if the volume of system has changed, it will be set to True automatically if of_wt_rho0 is not zero.
      * False: rho0 will change if volume of system has changed.
    default_value: "False"
    unit: ""
    availability: OFDFT with of_kinetic=wt
  - name: of_lkt_a
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Parameter a of LKT KEDF (kinetic energy density functional).
    default_value: "1.3"
    unit: ""
    availability: OFDFT with of_kinetic=lkt
  - name: of_xwm_rho_ref
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Reference charge density for XWM kinetic energy functional. If set to 0, the program will use average charge density.
    default_value: "0.0"
    unit: ""
    availability: OFDFT with of_kinetic=xwm
  - name: of_xwm_kappa
    category: "OFDFT: orbital free density functional theory"
    type: Real
    description: |
      Parameter for XWM kinetic energy functional. See PHYSICAL REVIEW B 100, 205132 (2019) for optimal values.
    default_value: "0.0"
    unit: ""
    availability: OFDFT with of_kinetic=xwm
  - name: of_read_kernel
    category: "OFDFT: orbital free density functional theory"
    type: Boolean
    description: |
      Whether to read in the kernel file.
      * True: The kernel of WT KEDF (kinetic energy density functional) will be filled from the file specified by of_kernel_file.
      * False: The kernel of WT KEDF (kinetic energy density functional) will be filled from formula.
    default_value: "False"
    unit: ""
    availability: OFDFT with of_kinetic=wt
  - name: of_kernel_file
    category: "OFDFT: orbital free density functional theory"
    type: String
    description: |
      The name of WT kernel file.
    default_value: WTkernel.txt
    unit: ""
    availability: OFDFT with of_read_kernel=True
  - name: of_full_pw
    category: "OFDFT: orbital free density functional theory"
    type: Boolean
    description: |
      Whether to use full planewaves.
      * True: Ecut will be ignored while collecting planewaves, so that all planewaves will be used in FFT.
      * False: Only use the planewaves inside ecut, the same as KSDFT.
    default_value: "True"
    unit: ""
    availability: OFDFT
  - name: of_full_pw_dim
    category: "OFDFT: orbital free density functional theory"
    type: Integer
    description: |
      Specify the parity of FFT dimensions.
      * 0: either odd or even.
      * 1: odd only.
      * 2: even only.

      Note: Even dimensions may cause slight errors in FFT. It should be ignorable in ofdft calculation, but it may make Cardinal B-spline interpolation unstable, so please set of_full_pw_dim = 1 if nbspline != -1.
    default_value: "0"
    unit: ""
    availability: OFDFT with of_full_pw = True
  - name: of_ml_gene_data
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Controls the generation of machine learning training data. When enabled, training data in .npy format will be saved in the directory OUT.${suffix}/.
    default_value: "False"
    unit: ""
    availability: Used only for KSDFT with plane wave basis
  - name: of_ml_device
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: String
    description: |
      Run Neural Network on GPU or CPU.
      * cpu: CPU
      * gpu: GPU
    default_value: cpu
    unit: ""
    availability: OFDFT
  - name: of_ml_feg
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Integer
    description: |
      The method to incorporate the Free Electron Gas (FEG) limit.
      * 0: Do not incorporate the FEG limit.
      * 1: Incorporate the FEG limit by translation.
      * 3: Incorporate the FEG limit by nonlinear transformation using softplus function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_nkernel
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Integer
    description: |
      Number of kernel functions.
    default_value: "1"
    unit: ""
    availability: OFDFT
  - name: of_ml_kernel
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the type of the i-th kernel function.
      * 1: Wang-Teter kernel function.
      * 2: Modified Yukawa function, and alpha is specified by of_ml_yukawa_alpha.
      * 3: Truncated kinetic kernel (TKK), the file containing TKK is specified by of_ml_kernel_file.
    default_value: "1"
    unit: ""
    availability: OFDFT
  - name: of_ml_kernel_scaling
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Real
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the RECIPROCAL of scaling parameter of the i-th kernel function.
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_yukawa_alpha
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Real
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the parameter alpha of i-th kernel function. ONLY used for Yukawa kernel function.
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_kernel_file
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of String
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the file containing the i-th kernel function. ONLY used for TKK.
    default_value: none
    unit: ""
    availability: OFDFT
  - name: of_ml_gamma
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Local descriptor: gamma = (rho / rho0)^(1/3).
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: of_ml_p
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Semi-local descriptor: p = |nabla rho|^2 / [2 (3 pi^2)^(1/3) rho^(4/3)]^2.
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: of_ml_q
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Semi-local descriptor: q = nabla^2 rho / [4 (3 pi^2)^(2/3) rho^(5/3)].
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhp
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Semi-local descriptor: tanhp = tanh(chi_p * p).
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhq
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Semi-local descriptor: tanhq = tanh(chi_q * q).
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: of_ml_chi_p
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Real
    description: |
      Hyperparameter chi_p: tanhp = tanh(chi_p * p).
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_chi_q
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Real
    description: |
      Hyperparameter chi_q: tanhq = tanh(chi_q * q).
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_gammanl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor gammanl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_pnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor pnl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_qnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor qnl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_xi
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor xi defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhxi
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanhxi defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhxi_nl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanhxi_nl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanh_pnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanh_pnl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanh_qnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanh_qnl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhp_nl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanhp_nl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_tanhq_nl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Integer
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element controls the non-local descriptor tanhq_nl defined by the i-th kernel function.
    default_value: "0"
    unit: ""
    availability: OFDFT
  - name: of_ml_chi_xi
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Real
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the hyperparameter chi_xi of non-local descriptor tanhxi defined by the i-th kernel function.
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_chi_pnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Real
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the hyperparameter chi_pnl of non-local descriptor tanh_pnl defined by the i-th kernel function.
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_chi_qnl
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Vector of Real
    description: |
      Containing nkernel (see of_ml_nkernel) elements. The i-th element specifies the hyperparameter chi_qnl of non-local descriptor tanh_qnl defined by the i-th kernel function.
    default_value: "1.0"
    unit: ""
    availability: OFDFT
  - name: of_ml_local_test
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      FOR TEST. Read in the density, and output the F and Pauli potential.
    default_value: "False"
    unit: ""
    availability: OFDFT
  - name: ml_exx
    category: "ML-KEDF: machine learning based kinetic energy density functional for OFDFT"
    type: Boolean
    description: |
      Whether to use machine learning based exact exchange (ML-EXX).
    default_value: "False"
    unit: ""
    availability: ""
  - name: method_sto
    category: Electronic structure (SDFT)
    type: Integer
    description: |
      Different methods to do stochastic DFT
      * 1: Calculate twice, this method cost less memory but is slower.
      * 2: Calculate once but needs much more memory. This method is much faster. Besides, it calculates with a smaller nche_sto. However, when the memory is not enough, only method 1 can be used.
      * other: use 2
    default_value: "2"
    unit: ""
    availability: esolver_type = sdft
  - name: nbands_sto
    category: Electronic structure (SDFT)
    type: Integer or string
    description: |
      The number of stochastic orbitals
      * > 0: Perform stochastic DFT. Increasing the number of bands improves accuracy and reduces stochastic errors; To perform mixed stochastic-deterministic DFT, you should set nbands, which represents the number of KS orbitals.
      * 0: Perform Kohn-Sham DFT.
      * all: All complete basis sets are used to replace stochastic orbitals with the Chebyshev method (CT), resulting in the same results as KSDFT without stochastic errors.
    default_value: "256"
    unit: ""
    availability: esolver_type = sdft
  - name: nche_sto
    category: Electronic structure (SDFT)
    type: Integer
    description: |
      Chebyshev expansion orders for stochastic DFT.
    default_value: "100"
    unit: ""
    availability: esolver_type = sdft
  - name: emin_sto
    category: Electronic structure (SDFT)
    type: Real
    description: |
      Trial energy to guess the lower bound of eigen energies of the Hamiltonian Operator.
    default_value: "0.0"
    unit: Ry
    availability: esolver_type = sdft
  - name: emax_sto
    category: Electronic structure (SDFT)
    type: Real
    description: |
      Trial energy to guess the upper bound of eigen energies of the Hamiltonian Operator.
    default_value: "0.0"
    unit: Ry
    availability: esolver_type = sdft
  - name: seed_sto
    category: Electronic structure (SDFT)
    type: Integer
    description: |
      The random seed to generate stochastic orbitals.
      * >= 0: Stochastic orbitals have the form of exp(i*theta), where theta is a uniform distribution in [0, 2*pi).
      * 0: the seed is decided by time(NULL).
      * <= -1: Stochastic orbitals have the form of +1 or -1 with equal probability.
      * -1: the seed is decided by time(NULL).
    default_value: "0"
    unit: ""
    availability: esolver_type = sdft
  - name: initsto_ecut
    category: Electronic structure (SDFT)
    type: Real
    description: |
      Stochastic wave functions are initialized in a large box generated by "4*initsto_ecut". initsto_ecut should be larger than ecutwfc. In this method, SDFT results are the same when using different cores. Besides, coefficients of the same G are the same when ecutwfc is rising to initsto_ecut. If it is smaller than ecutwfc, it will be turned off.
    default_value: "0.0"
    unit: Ry
    availability: esolver_type = sdft
  - name: initsto_freq
    category: Electronic structure (SDFT)
    type: Integer
    description: |
      Frequency (once each initsto_freq steps) to generate new stochastic orbitals when running md.
      * positive integer: Update stochastic orbitals
      * 0: Never change stochastic orbitals.
    default_value: "0"
    unit: ""
    availability: esolver_type = sdft
  - name: npart_sto
    category: Electronic structure (SDFT)
    type: Integer
    description: |
      Make memory cost to 1/npart_sto times of the previous one when running the post process of SDFT like DOS or conductivities.
    default_value: "1"
    unit: ""
    availability: method_sto = 2 and out_dos = 1 or cal_cond = True
  - name: deepks_out_labels
    category: DeePKS
    type: Integer
    description: |
      Print labels and descriptors for DeePKS in OUT.${suffix}. The names of these files start with "deepks".
      * 0 : No output.
      * 1 : Output intermediate files needed during DeePKS training.
      * 2 : Output target labels for label preperation. The label files are named as deepks_<property>.npy or deepks_<property>.csr, where the units and formats are the same as label files <property>.npy or <property>.csr required for training, except that the first dimension (nframes) is excluded. System structrue files are also given in deepks_atom.npy and deepks_box.npy in the unit of Bohr, which means lattice_constant should be set to 1 when training.

      [NOTE] When deepks_out_labels equals 1, the path of a numerical descriptor (an orb file) is needed to be specified under the NUMERICAL_DESCRIPTOR tag in the STRU file. This is not needed when deepks_out_labels equals 2.
    default_value: "0"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: deepks_out_freq_elec
    category: DeePKS
    type: Integer
    description: |
      When deepks_out_freq_elec is greater than 0, print labels and descriptors for DeePKS in OUT.${suffix}/DeePKS_Labels_Elec per deepks_out_freq_elec electronic iterations, with suffix _e* to distinguish different steps. Often used with deepks_out_labels equals 1.
    default_value: "0"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: deepks_out_base
    category: DeePKS
    type: String
    description: |
      Print labels and descriptors calculated by base functional ( determined by deepks_out_base ) and target functional ( determined by dft_functional ) for DeePKS in per deepks_out_freq_elec electronic iterations. The SCF process, labels and descriptors output of the target functional are all consistent with those when the target functional is used alone. The only additional output under this configuration is the labels of the base functional. Often used with deepks_out_labels equals 1.
    default_value: None
    unit: ""
    availability: Numerical atomic orbital basis and deepks_out_freq_elec is greater than 0
  - name: deepks_scf
    category: DeePKS
    type: Boolean
    description: |
      perform self-consistent field iteration in DeePKS method

      [NOTE] A trained, traced model file is needed.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: deepks_equiv
    category: DeePKS
    type: Boolean
    description: |
      whether to use equivariant version of DeePKS

      [NOTE] The equivariant version of DeePKS-kit is still under development, so this feature is currently only intended for internal usage.
    default_value: "False"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: deepks_model
    category: DeePKS
    type: String
    description: |
      the path of the trained, traced neural network model file generated by deepks-kit
    default_value: None
    unit: ""
    availability: Numerical atomic orbital basis and deepks_scf is true
  - name: bessel_descriptor_lmax
    category: DeePKS
    type: Integer
    description: |
      the maximum angular momentum of the Bessel functions generated as the projectors in DeePKS - NOte: To generate such projectors, set calculation type to gen_bessel in ABACUS. See also calculation.
    default_value: "2"
    unit: ""
    availability: gen_bessel calculation
  - name: bessel_descriptor_ecut
    category: DeePKS
    type: String
    description: |
      energy cutoff of Bessel functions
    default_value: same as ecutwfc
    unit: Ry
    availability: gen_bessel calculation
  - name: bessel_descriptor_tolerence
    category: DeePKS
    type: Real
    description: |
      tolerance for searching the zeros of Bessel functions
    default_value: "1.0e-12"
    unit: ""
    availability: gen_bessel calculation
  - name: bessel_descriptor_rcut
    category: DeePKS
    type: Real
    description: |
      cutoff radius of Bessel functions
    default_value: "6.0"
    unit: Bohr
    availability: gen_bessel calculation
  - name: bessel_descriptor_smooth
    category: DeePKS
    type: Boolean
    description: |
      smooth the Bessel functions at radius cutoff
    default_value: "False"
    unit: ""
    availability: gen_bessel calculation
  - name: bessel_descriptor_sigma
    category: DeePKS
    type: Real
    description: |
      smooth parameter at the cutoff radius of projectors
    default_value: "0.1"
    unit: Bohr
    availability: gen_bessel calculation
  - name: deepks_bandgap
    category: DeePKS
    type: Integer
    description: |
      include bandgap label for DeePKS training
      * 0: Don't include bandgap label
      * 1: Include target bandgap label (see deepks_band_range for more details)
      * 2: Include multiple bandgap label (see deepks_band_range for more details)
      * 3: Used for systems containing H atoms. Here HOMO is defined as the max occupation except H atoms and the bandgap label is the energy between HOMO and (HOMO + 1)
    default_value: "0"
    unit: ""
    availability: Numerical atomic orbital basis and deepks_scf is true
  - name: deepks_band_range
    category: DeePKS
    type: "Integer*2"
    description: |
      The first value should not be larger than the second one and the meaning differs in different cases below
      * deepks_bandgap is 1: Bandgap label is the energy between LUMO + deepks_band_range[0] and LUMO + deepks_band_range[1]. If not set, it will calculate energy between HOMO and LUMO states.
      * deepks_bandgap is 2: Bandgap labels are energies between HOMO and all states in range [LUMO + deepks_band_range[0], LUMO + deepks_band_range[1]] (Thus there are deepks_band_range[1] - deepks_band_range[0] + 1 bandgaps in total). If HOMO is included in the setting range, it will be ignored since it will always be zero and has no valuable messages (deepks_band_range[1] - deepks_band_range[0] bandgaps in this case). NOTICE: The set range can be greater than, less than, or include the value of HOMO. In the bandgap label, we always calculate the energy of the state in the set range minus the energy of HOMO state, so the bandgap can be negative if the state is lower than HOMO.
    default_value: "-1 0"
    unit: ""
    availability: "Numerical atomic orbital basis, deepks_scf is true, and deepks_bandgap is 1 or 2"
  - name: deepks_v_delta
    category: DeePKS
    type: Integer
    description: |
      Include V_delta/V_delta_R (Hamiltonian in k/real space) label for DeePKS training. When deepks_out_labels is true and deepks_v_delta > 0 (k space), ABACUS will output deepks_hbase.npy, deepks_vdelta.npy and deepks_htot.npy(htot=hbase+vdelta). When deepks_out_labels is true and deepks_v_delta < 0 (real space), ABACUS will output deepks_hrtot.csr, deepks_hrdelta.csr. Some more files output for different settings. NOTICE: To match the unit Normally used in DeePKS, the unit of Hamiltonian in k space is Hartree. However, currently in R space the unit is still Ry.
      * deepks_v_delta = 1: deepks_vdpre.npy, which is used to calculate V_delta during DeePKS training.
      * deepks_v_delta = 2: deepks_phialpha.npy and deepks_gevdm.npy, which can be used to calculate deepks_vdpre.npy. A recommanded method for memory saving.
      * deepks_v_delta = -1: deepks_vdrpre.npy, which is used to calculate V_delta_R during DeePKS training.
      * deepks_v_delta = -2: deepks_phialpha_r.npy and deepks_gevdm.npy, which can be used to calculate deepks_vdrpre.npy. A recommanded method for memory saving.
    default_value: "0"
    unit: ""
    availability: Numerical atomic orbital basis
  - name: deepks_out_unittest
    category: DeePKS
    type: Boolean
    description: |
      generate files for constructing DeePKS unit test

      [NOTE] Not relevant when running actual calculations. When set to 1, ABACUS needs to be run with only 1 process.
    default_value: "False"
    unit: ""
    availability: ""
  - name: estep_per_md
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Integer
    description: |
      The number of electronic propagation steps between two ionic steps.
    default_value: "1"
    unit: ""
    availability: ""
  - name: td_dt
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Real
    description: |
      The time step used in electronic propagation. Setting td_dt will reset the value of md_dt to td_dt * estep_per_md.
    default_value: md_dt / estep_per_md
    unit: fs
    availability: ""
  - name: td_edm
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Integer
    description: |
      Method to calculate the energy-density matrix, mainly affects the calculation of force and stress.
      * 0: Using the original formula.
      * 1: Using the formula for ground state (deprecated). Note that this usually does not hold if wave function is not the eigenstate of the Hamiltonian.
    default_value: "0"
    unit: ""
    availability: ""
  - name: td_print_eij
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Real
    description: |
      Controls the printing of Hamiltonian matrix elements.
      * < 0: Suppress all output.
      * >= 0: Print only elements with either i or j exceeding td_print_eij.
    default_value: "-1"
    unit: Ry
    availability: ""
  - name: td_propagator
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Integer
    description: |
      Methods of electronic propagation.
      * 0: Crank-Nicolson, based on matrix inversion.
      * 1: 4th-order Taylor expansion of exponential.
      * 2: Enforced time-reversal symmetry (ETRS).
      * 3: Crank-Nicolson, based on solving linear equation.
    default_value: "0"
    unit: ""
    availability: ""
  - name: td_vext
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Boolean
    description: |
      * True: Add a laser-material interaction (external electric field).
      * False: No external electric field.
    default_value: "False"
    unit: ""
    availability: ""
  - name: td_vext_dire
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: String
    description: |
      Specifies the direction(s) of the external electric field when td_vext is enabled. For example, td_vext_dire 1 2 indicates that external electric fields are applied to both the x and y directions simultaneously. Electric field parameters can also be written as strings. For example, td_gauss_phase 0 1.5707963 indicates that the Gaussian type electric fields in the x and y directions have a phase delay of pi/2.
      * 1: The external field direction is along the x-axis.
      * 2: The external field direction is along the y-axis.
      * 3: The external field direction is along the z-axis.
    default_value: "1"
    unit: ""
    availability: ""
  - name: td_stype
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: Integer
    description: |
      Type of electric field in the space domain, i.e. the gauge of the electric field.
      * 0: Length gauge.
      * 1: Velocity gauge.
      * 2: Hybrid gauge. See J. Chem. Theory Comput. 2025, 21, 3335-3341 for more information.
    default_value: "0"
    unit: ""
    availability: ""
  - name: td_ttype
    category: "RT-TDDFT: Real-Time Time-Dependent Density Functional Theory"
    type: String
    description: |
      Type of electric field in the time domain.
      * 0: Gaussian type function.
      * 1: Trapezoid type function.
      * 2: Trigonometric type function.
      * 3: Heaviside type function.
    default_value: "0"
