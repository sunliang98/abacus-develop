    default_value: "1"
    unit: ""
    availability: ""
  - name: out_wannier_unk
    category: Berry phase and wannier90 interface
    type: Boolean
    description: |
      Write the "UNK.*" file or not.
      * 0: don't write the "UNK.*" file.
      * 1: write the "UNK.*" file.
    default_value: "0"
    unit: ""
    availability: ""
  - name: out_wannier_wvfn_formatted
    category: Berry phase and wannier90 interface
    type: Boolean
    description: |
      Write the "UNK.*" file in ASCII format or binary format.
      * 0: write the "UNK.*" file in binary format.
      * 1: write the "UNK.*" file in ASCII format (text file format).
    default_value: "1"
    unit: ""
    availability: ""
  - name: efield_flag
    category: Electric field and dipole correction
    type: Boolean
    description: |
      Added the electric field.
      * True: A saw-like potential simulating an electric field is added to the bare ionic potential.
      * False: Not added the electric field.
    default_value: "False"
    unit: ""
    availability: ""
  - name: dip_cor_flag
    category: Electric field and dipole correction
    type: Boolean
    description: |
      Added a dipole correction to the bare ionic potential.
      * True: A dipole correction is also added to the bare ionic potential.
      * False: A dipole correction is not added to the bare ionic potential.

      [NOTE] Note: If you do not want any electric field, the parameter efield_amp should be set to zero. This should ONLY be used in a slab geometry for surface calculations, with the discontinuity FALLING IN THE EMPTY SPACE.
    default_value: "False"
    unit: ""
    availability: With dip_cor_flag = True and efield_flag = True.
  - name: efield_dir
    category: Electric field and dipole correction
    type: Integer
    description: |
      The direction of the electric field or dipole correction is parallel to the reciprocal lattice vector, so the potential is constant in planes defined by FFT grid points, efield_dir can set to 0, 1 or 2.
      * 0: parallel to the first reciprocal lattice vector
      * 1: parallel to the second reciprocal lattice vector
      * 2: parallel to the third reciprocal lattice vector
    default_value: "2"
    unit: ""
    availability: with efield_flag = True.
  - name: efield_pos_max
    category: Electric field and dipole correction
    type: Real
    description: |
      Position of the maximum of the saw-like potential along crystal axis efield_dir, within the unit cell, 0 <= efield_pos_max < 1.
    default_value: Autoset to center of vacuum - width of vacuum / 20
    unit: ""
    availability: with efield_flag = True.
  - name: efield_pos_dec
    category: Electric field and dipole correction
    type: Real
    description: |
      Zone in the unit cell where the saw-like potential decreases, 0 < efield_pos_dec < 1.
    default_value: Autoset to width of vacuum / 10
    unit: ""
    availability: with efield_flag = True.
  - name: efield_amp
    category: Electric field and dipole correction
    type: Real
    description: |
      Amplitude of the electric field. The saw-like potential increases with slope efield_amp in the region from efield_pos_max+efield_pos_dec-1) to (efield_pos_max), then decreases until (efield_pos_max+efield_pos_dec), in units of the crystal vector efield_dir.

      [NOTE] Note: The change of slope of this potential must be located in the empty region, or else unphysical forces will result.
    default_value: "0.0"
    unit: "a.u., 1 a.u. = 51.4220632*10^10 V/m."
    availability: with efield_flag = True.
  - name: gate_flag
    category: Gate field (compensating charge)
    type: Boolean
    description: |
      Controls the addition of compensating charge by a charged plate for charged cells.
      * true: A charged plate is placed at the zgate position to add compensating charge. The direction is determined by efield_dir.
      * false: No compensating charge is added.
    default_value: "false"
    unit: ""
    availability: ""
  - name: zgate
    category: Gate field (compensating charge)
    type: Real
    description: |
      Position of the charged plate in the unit cell
    default_value: "0.5"
    unit: Unit cell size
    availability: ""
  - name: block
    category: Gate field (compensating charge)
    type: Boolean
    description: |
      Controls the addition of a potential barrier to prevent electron spillover.
      * true: A potential barrier is added from block_down to block_up with a height of block_height. If dip_cor_flag is set to true, efield_pos_dec is used to smoothly increase and decrease the potential barrier.
      * false: No potential barrier is added.
    default_value: "false"
    unit: ""
    availability: ""
  - name: block_down
    category: Gate field (compensating charge)
    type: Real
    description: |
      Lower beginning of the potential barrier
    default_value: "0.45"
    unit: Unit cell size
    availability: ""
  - name: block_up
    category: Gate field (compensating charge)
    type: Real
    description: |
      Upper beginning of the potential barrier
    default_value: "0.55"
    unit: Unit cell size
    availability: ""
  - name: block_height
    category: Gate field (compensating charge)
    type: Real
    description: |
      Height of the potential barrier
    default_value: "0.1"
    unit: Rydberg
    availability: ""
  - name: imp_sol
    category: Implicit solvation model
    type: Boolean
    description: |
      Calculate implicit solvation correction
    default_value: "False"
    unit: ""
    availability: ""
  - name: eb_k
    category: Implicit solvation model
    type: Real
    description: |
      The relative permittivity of the bulk solvent, 80 for water
    default_value: "80"
    unit: ""
    availability: imp_sol is true.
  - name: tau
    category: Implicit solvation model
    type: Real
    description: |
      The effective surface tension parameter that describes the cavitation, the dispersion, and the repulsion interaction between the solute and the solvent which are not captured by the electrostatic terms
    default_value: "1.0798e-05"
    unit: ""
    availability: ""
  - name: sigma_k
    category: Implicit solvation model
    type: Real
    description: |
      The width of the diffuse cavity that is implicitly determined by the electronic structure of the solute
    default_value: "0.6"
    unit: ""
    availability: ""
  - name: nc_k
    category: Implicit solvation model
    type: Real
    description: |
      The value of the electron density at which the dielectric cavity forms
    default_value: "0.00037"
    unit: ""
    availability: ""
  - name: vdw_method
    category: vdW correction
    type: String
    description: |
      Specifies the method used for Van der Waals (VdW) correction. Available options are:
      * d2: Grimme's D2 dispersion correction method
      * d3_0: Grimme's DFT-D3(0) dispersion correction method (zero-damping)
      * d3_bj: Grimme's DFTD3(BJ) dispersion correction method (BJ-damping)
      * none: no vdW correction

      [NOTE] ABACUS supports automatic setting of DFT-D3 parameters for common functionals. To benefit from this feature, please specify the parameter dft_functional explicitly, otherwise the autoset procedure will crash. If not satisfied with the built-in parameters, any manual setting on vdw_s6, vdw_s8, vdw_a1 and vdw_a2 will overwrite the automatic values.
    default_value: none
    unit: ""
    availability: ""
  - name: vdw_s6
    category: vdW correction
    type: String
    description: |
      This scale factor is used to optimize the interaction energy deviations in van der Waals (vdW) corrected calculations. The recommended values of this parameter are dependent on the chosen vdW correction method and the DFT functional being used. For DFT-D2, the recommended values are 0.75 (PBE), 1.2 (BLYP), 1.05 (B-P86), 1.0 (TPSS), and 1.05 (B3LYP). If not set, will use values of PBE functional. For DFT-D3, recommended values with different DFT functionals can be found on the here. If not set, will search in ABACUS built-in dataset based on the dft_functional keywords. User set value will overwrite the searched value.
    default_value: ""
    unit: ""
    availability: "vdw_method is set to d2, d3_0, or d3_bj"
  - name: vdw_s8
    category: vdW correction
    type: String
    description: |
      This scale factor is relevant for D3(0) and D3(BJ) van der Waals (vdW) correction methods. The recommended values of this parameter with different DFT functionals can be found on the webpage. If not set, will search in ABACUS built-in dataset based on the dft_functional keywords. User set value will overwrite the searched value.
    default_value: ""
    unit: ""
    availability: vdw_method is set to d3_0 or d3_bj
  - name: vdw_a1
    category: vdW correction
    type: String
    description: |
      This damping function parameter is relevant for D3(0) and D3(BJ) van der Waals (vdW) correction methods. The recommended values of this parameter with different DFT functionals can be found on the webpage. If not set, will search in ABACUS built-in dataset based on the dft_functional keywords. User set value will overwrite the searched value.
    default_value: ""
    unit: ""
    availability: vdw_method is set to d3_0 or d3_bj
  - name: vdw_a2
    category: vdW correction
    type: String
    description: |
      This damping function parameter is only relevant for D3(0) and D3(BJ) van der Waals (vdW) correction methods. The recommended values of this parameter with different DFT functionals can be found on the webpage. If not set, will search in ABACUS built-in dataset based on the dft_functional keywords. User set value will overwrite the searched value.
    default_value: ""
    unit: ""
    availability: vdw_method is set to d3_0 or d3_bj
  - name: vdw_d
    category: vdW correction
    type: Real
    description: |
      Controls the damping rate of the damping function in the DFT-D2 method.
    default_value: "20"
    unit: ""
    availability: vdw_method is set to d2
  - name: vdw_abc
    category: vdW correction
    type: Boolean
    description: |
      Determines whether three-body terms are calculated for DFT-D3 methods.
      * True: ABACUS will calculate the three-body term.
      * False: The three-body term is not included.
    default_value: "False"
    unit: ""
    availability: vdw_method is set to d3_0 or d3_bj
  - name: vdw_c6_file
    category: vdW correction
    type: String
    description: |
      Specifies the name of the file containing parameters for each element when using the D2 method. If not set, ABACUS uses the default parameters (Jnm6/mol) stored in the program. To manually set the parameters, provide a file containing the parameters. An example is given by:

      H 0.1 Si 9.0

      Namely, each line contains the element name and the corresponding parameter.
    default_value: default
    unit: ""
    availability: vdw_method is set to d2
  - name: vdw_c6_unit
    category: vdW correction
    type: String
    description: |
      Specifies the unit of the provided parameters in the D2 method. Available options are:
      * Jnm6/mol (J nm^6/mol)
      * eVA (eV Angstrom)
    default_value: Jnm6/mol
    unit: ""
    availability: vdw_C6_file is not default
  - name: vdw_r0_file
    category: vdW correction
    type: String
    description: |
      Specifies the name of the file containing parameters for each element when using the D2 method. If not set, ABACUS uses the default parameters (Angstrom) stored in the program. To manually set the parameters, provide a file containing the parameters. An example is given by:

      Li 1.0 Cl 2.0

      Namely, each line contains the element name and the corresponding parameter.
    default_value: default
    unit: ""
    availability: vdw_method is set to d2
  - name: vdw_r0_unit
    category: vdW correction
    type: String
    description: |
      Specifies the unit for the parameters in the D2 method when manually set by the user. Available options are:
      * A (Angstrom)
      * Bohr
    default_value: "A"
    unit: ""
    availability: vdw_R0_file is not default
  - name: vdw_cutoff_type
    category: vdW correction
    type: String
    description: |
      Determines the method used for specifying the cutoff radius in periodic systems when applying Van der Waals correction. Available options are:
      * radius: The supercell is selected within a sphere centered at the origin with a radius defined by vdw_cutoff_radius.
      * period: The extent of the supercell is explicitly specified using the vdw_cutoff_period keyword.
    default_value: radius
    unit: ""
    availability: ""
  - name: vdw_cutoff_radius
    category: vdW correction
    type: String
    description: |
      Defines the radius of the cutoff sphere when vdw_cutoff_type is set to radius. The default values depend on the chosen vdw_method.
    default_value: ""
    unit: defined by vdw_radius_unit (default Bohr)
    availability: vdw_cutoff_type is set to radius
  - name: vdw_radius_unit
    category: vdW correction
    type: String
    description: |
      Specify the unit of vdw_cutoff_radius. Available options are:
      * A(Angstrom)
      * Bohr
    default_value: Bohr
    unit: ""
    availability: vdw_cutoff_type is set to radius
  - name: vdw_cutoff_period
    category: vdW correction
    type: Integer Integer Integer
    description: |
      The three integers supplied here explicitly specify the extent of the supercell in the directions of the three basis lattice vectors.
    default_value: 3 3 3
    unit: ""
    availability: vdw_cutoff_type is set to period
  - name: vdw_cn_thr
    category: vdW correction
    type: Real
    description: |
      The cutoff radius when calculating coordination numbers.
    default_value: "40"
    unit: "defined by vdw_cn_thr_unit (default: Bohr)"
    availability: vdw_method is set to d3_0 or d3_bj
  - name: vdw_cn_thr_unit
    category: vdW correction
    type: String
    description: |
      Unit of the coordination number cutoff (vdw_cn_thr). Available options are:
      * A(Angstrom)
      * Bohr
    default_value: Bohr
    unit: ""
    availability: ""
  - name: exx_fock_alpha
    category: Exact Exchange (Common)
    type: Real
    description: |
      Fraction of full-ranged Fock exchange $1/r$ in range-separated hybrid functionals.
    default_value: see hybrid_func_params
    unit: ""
    availability: ""
  - name: exx_erfc_alpha
    category: Exact Exchange (Common)
    type: Real
    description: |
      Fraction of short-ranged Fock exchange $\mathrm{erfc}(\omega r)/r$ in range-separated hybrid functionals.
    default_value: see hybrid_func_params
    unit: ""
    availability: ""
  - name: exx_erfc_omega
    category: Exact Exchange (Common)
    type: Real
    description: |
      Range-separation parameter $\omega$ in the short-ranged Fock term $\mathrm{erfc}(\omega r)/r$.
    default_value: see hybrid_func_params
    unit: ""
    availability: ""
  - name: exx_separate_loop
    category: Exact Exchange (Common)
    type: Boolean
    description: |
      There are two types of iterative approaches provided by ABACUS to evaluate Fock exchange.
      * False: Start with a GGA-Loop, and then Hybrid-Loop, in which EXX Hamiltonian is updated with electronic iterations.
      * True: A two-step method is employed, i.e. in the inner iterations, density matrix is updated, while in the outer iterations, is calculated based on density matrix that converges in the inner iteration.
    default_value: "True"
    unit: ""
    availability: ""
  - name: exx_hybrid_step
    category: Exact Exchange (Common)
    type: Integer
    description: |
      The maximal iteration number of the outer-loop, where the Fock exchange is calculated
    default_value: "100"
    unit: ""
    availability: exx_separate_loop==1
  - name: exx_mixing_beta
    category: Exact Exchange (Common)
    type: Real
    description: |
      Mixing parameter for densty matrix in each iteration of the outer-loop
    default_value: "1.0"
    unit: ""
    availability: exx_separate_loop==1
  - name: exx_fock_lambda
    category: Exact Exchange (LCAO in PW)
    type: Real
    description: |
      It is used to compensate for divergence points at G=0 in the evaluation of Fock exchange using lcao_in_pw method.
    default_value: "0.3"
    unit: ""
    availability: basis_type==lcao_in_pw
  - name: exx_pca_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      To accelerate the evaluation of four-center integrals (), the product of atomic orbitals are expanded in the basis of auxiliary basis functions (ABF): . The size of the ABF (i.e. number of ) is reduced using principal component analysis. When a large PCA threshold is used, the number of ABF will be reduced, hence the calculation becomes faster. However, this comes at the cost of computational accuracy. A relatively safe choice of the value is 1e-4.
    default_value: "1E-4"
    unit: ""
    availability: ""
  - name: exx_c_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. Smaller components (less than exx_c_threshold) of the matrix are neglected to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 1e-4.
    default_value: "1E-4"
    unit: ""
    availability: ""
  - name: exx_cs_inv_thr
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      By default, the Coulomb matrix inversion required for obtaining LRI coefficients is performed using LU decomposition. However, this approach may suffer from numerical instabilities when a large set of auxiliary basis functions (ABFs) is employed. When exx_cs_inv_thr > 0, the inversion is instead carried out via matrix diagonalization. Eigenvalues smaller than exx_cs_inv_thr are discarded to improve numerical stability. A relatively safe and commonly recommended value is 1e-5.
    default_value: "-1"
    unit: ""
    availability: ""
  - name: exx_v_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. With the approximation , the four-center integral in Fock exchange is expressed as , where is a double-center integral. Smaller values of the V matrix can be truncated to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 0, i.e. no truncation.
    default_value: "1E-1"
    unit: ""
    availability: ""
  - name: exx_dm_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      The Fock exchange can be expressed as where D is the density matrix. Smaller values of the density matrix can be truncated to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 1e-4.
    default_value: "1E-4"
    unit: ""
    availability: ""
  - name: exx_c_grad_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. is used in force. Smaller components (less than exx_c_grad_threshold) of the matrix are neglected to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 1e-4.
    default_value: "1E-4"
    unit: ""
    availability: ""
  - name: exx_v_grad_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. With the approximation , the four-center integral in Fock exchange is expressed as , where is a double-center integral. is used in force. Smaller values of the V matrix can be truncated to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 0, i.e. no truncation.
    default_value: "1E-1"
    unit: ""
    availability: ""
  - name: exx_c_grad_r_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. is used in stress. Smaller components (less than exx_c_grad_r_threshold) of the matrix are neglected to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 1e-4.
    default_value: "1E-4"
    unit: ""
    availability: ""
  - name: exx_v_grad_r_threshold
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      See also the entry exx_pca_threshold. With the approximation , the four-center integral in Fock exchange is expressed as , where is a double-center integral. is used in force and stress. Smaller values of the V matrix can be truncated to accelerate calculation. The larger the threshold is, the faster the calculation and the lower the accuracy. A relatively safe choice of the value is 0, i.e. no truncation.
    default_value: "1E-1"
    unit: ""
    availability: ""
  - name: exx_ccp_rmesh_times
    category: Exact Exchange (LCAO)
    type: String
    description: |
      This parameter determines how many times larger the radial mesh required for calculating Columb potential is to that of atomic orbitals. The value should be larger than 0. Reducing this value can effectively increase the speed of self-consistent calculations using hybrid functionals.
    default_value: ""
    unit: ""
    availability: ""
  - name: exx_opt_orb_lmax
    category: Exact Exchange (LCAO)
    type: Integer
    description: |
      The maximum l of the spherical Bessel functions, when the radial part of opt-ABFs are generated as linear combinations of spherical Bessel functions. A reasonable choice is 2.
    default_value: "0"
    unit: ""
    availability: calculation==gen_opt_abfs
  - name: exx_opt_orb_ecut
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      The cut-off of plane wave expansion, when the plane wave basis is used to optimize the radial ABFs. A reasonable choice is 60.
    default_value: "0"
    unit: Ry
    availability: calculation==gen_opt_abfs
  - name: exx_opt_orb_tolerence
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      The threshold when solving for the zeros of spherical Bessel functions. A reasonable choice is 1e-12.
    default_value: "1E-12"
    unit: ""
    availability: calculation==gen_opt_abfs
  - name: exx_real_number
    category: Exact Exchange (LCAO)
    type: String
    description: |
      * True: Enforce LibRI to use double data type.
      * False: Enforce LibRI to use complex data type. Setting it to True can effectively improve the speed of self-consistent calculations with hybrid functionals.
    default_value: depends on the gamma_only option
    unit: ""
    availability: ""
  - name: exx_singularity_correction
    category: Exact Exchange (LCAO)
    type: String
    description: |
      * spencer: see Phys. Rev. B 77, 193110 (2008).
      * revised_spencer: see Phys. Rev. Mater. 5, 013807 (2021). Set the scheme of Coulomb singularity correction.
    default_value: default
    unit: ""
    availability: ""
  - name: rpa_ccp_rmesh_times
    category: Exact Exchange (LCAO)
    type: Real
    description: |
      How many times larger the radial mesh required is to that of atomic orbitals in the postprocess calculation of the bare Coulomb matrix for RPA, GW, etc.
    default_value: "10"
    unit: ""
    availability: ""
  - name: exx_symmetry_realspace
    category: Exact Exchange (LCAO)
    type: Boolean
    description: |
      * False: only rotate k-space density matrix D(k) from irreducible k-points to accelerate diagonalization
      * True: rotate both D(k) and Hexx(R) to accelerate both diagonalization and EXX calculation
    default_value: "True"
    unit: ""
    availability: symmetry==1 and exx calculation (dft_fuctional==hse/hf/pbe0/scan0 or rpa==True)
  - name: out_ri_cv
    category: Exact Exchange (LCAO)
    type: Boolean
    description: |
      Whether to output the coefficient tensor C(R) and ABFs-representation Coulomb matrix V(R) for each atom pair and cell in real space.
    default_value: "false"
    unit: ""
    availability: ""
  - name: dft_plus_u
    category: DFT+U correction
    type: Integer
    description: |
      Determines whether to calculate the plus U correction, which is especially important for correlated electrons.
      * 1: Calculate plus U correction with radius-adjustable localized projections (with parameter onsite_radius).
      * 2: Calculate plus U correction using first zeta of NAOs as projections (this is old method for testing).
      * 0: Do not calculate plus U correction.
    default_value: "0"
    unit: ""
    availability: ""
  - name: dft_plus_dmft
    category: DFT+U correction
    type: Boolean
    description: |
      Whether to enable DFT+DMFT calculation. True: DFT+DMFT; False: standard DFT calculation.
    default_value: "False"
    unit: ""
    availability: basis_type==lcao
  - name: orbital_corr
    category: DFT+U correction
    type: Vector of Integer (n values where n is the number of atomic types)
    description: |
      Specifies which orbits need plus U correction for each atom type ( for atom type 1, 2, 3, respectively).
      * -1: The plus U correction will not be calculated for this atom.
      * 1: For p-electron orbits, the plus U correction is needed.
      * 2: For d-electron orbits, the plus U correction is needed.
      * 3: For f-electron orbits, the plus U correction is needed.
    default_value: "-1"
    unit: ""
    availability: ""
  - name: hubbard_u
    category: DFT+U correction
    type: Vector of Real (n values where n is the number of atomic types)
    description: |
      Specifies the Hubbard Coulomb interaction parameter U (eV) in plus U correction, which should be specified for each atom unless the Yukawa potential is used.

      [NOTE] Note: Since only the simplified scheme by Duradev is implemented, the 'U' here is actually U-effective, which is given by Hubbard U minus Hund J.
    default_value: "0.0"
    unit: ""
    availability: ""
  - name: yukawa_potential
    category: DFT+U correction
    type: Boolean
    description: |
      Determines whether to use the local screen Coulomb potential method to calculate the values of U and J.
      * True: hubbard_u does not need to be specified.
      * False: hubbard_u does need to be specified.
    default_value: "False"
    unit: ""
    availability: ""
  - name: yukawa_lambda
    category: DFT+U correction
    type: Real
    description: |
      The screen length of Yukawa potential. If left to default, the screen length will be calculated as an average of the entire system. It's better to stick to the default setting unless there is a very good reason.
    default_value: Calculated on the fly.
    unit: ""
    availability: DFT+U with yukawa_potential = True.
  - name: uramping
    category: DFT+U correction
    type: Real
    description: |
      Once uramping > 0.15 eV. DFT+U calculations will start SCF with U = 0 eV, namely normal LDA/PBE calculations. Once SCF restarts when drho<mixing_restart, U value will increase by uramping eV. SCF will repeat above calcuations until U values reach target defined in hubbard_u. As for uramping=1.0 eV, the recommendations of mixing_restart is around 5e-4.
    default_value: "-1.0."
    unit: eV
    availability: "DFT+U calculations with mixing_restart > 0."
  - name: omc
    category: DFT+U correction
    type: Integer
    description: |
      The parameter controls the form of occupation matrix control used.
      * 0: No occupation matrix control is performed, and the onsite density matrix will be calculated from wavefunctions in each SCF step.
      * 1: The first SCF step will use an initial density matrix read from a file named initial_onsite.dm, but for later steps, the onsite density matrix will be updated.
      * 2: The same onsite density matrix from initial_onsite.dm will be used throughout the entire calculation.

      [NOTE] The easiest way to create initial_onsite.dm is to run a DFT+U calculation, look for a file named onsite.dm in the OUT.prefix directory, and make replacements there. The format of the file is rather straight-forward.
    default_value: "0"
    unit: ""
    availability: ""
  - name: onsite_radius
    category: DFT+U correction
    type: Real
    description: |
      * The onsite_radius parameter facilitates modulation of the single-zeta portion of numerical atomic orbitals used for DFT+U projections.
      * The modulation algorithm applies a smooth truncation to the orbital tail followed by normalization. A representative profile is $f(r)=\frac{1}{2}\left[1+\operatorname{erf}\!\left(\frac{r_c-r}{\sigma}\right)\right]$, where $r_c$ is the cutoff radius and $\sigma=\gamma r_c$ controls smoothness.
    default_value: "3.0"
    unit: Bohr
    availability: dft_plus_u is set to 1
